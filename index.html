<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교육실 개발파트 업무 현황</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F4F7FF;
      color: #1e293b;
      min-height: 100vh;
      padding-left: 108px;
    }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #5068B5 0%, #42B08A 100%);
      color: #fff;
      padding: 14px 40px 12px;
      box-shadow: 0 4px 16px rgba(30,58,138,.25);
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.5px; margin-bottom: 2px; }
    header p.subtitle { font-size: .78rem; opacity: .75; margin-bottom: 10px; }

    .overall-bar-wrap { display: flex; align-items: center; gap: 14px; }
    .overall-bar-wrap label { font-size: .8rem; opacity: .85; white-space: nowrap; }
    .overall-bar-track {
      flex: 1; height: 10px;
      background: rgba(255,255,255,.25);
      border-radius: 99px; overflow: hidden;
    }
    .overall-bar-fill {
      height: 100%; background: #F8B84A;
      border-radius: 99px; transition: width .5s ease;
    }
    .overall-pct { font-size: .85rem; font-weight: 700; min-width: 38px; text-align: right; }

    /* ── 메인 ── */
    main { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

    /* ── 학년 섹션 ── */
    .grade-section { margin-bottom: 52px; }

    .grade-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    }
    .grade-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--grade-color, #94A7E8);
      color: #fff; font-size: .85rem; font-weight: 700; flex-shrink: 0;
    }
    .grade-header h2 { font-size: 1.18rem; font-weight: 700; color: #1e293b; }
    .grade-mini-bar {
      flex: 1; height: 6px; background: #DDE5FF;
      border-radius: 99px; overflow: hidden; max-width: 200px;
    }
    .grade-mini-fill {
      height: 100%; background: var(--grade-color, #94A7E8);
      border-radius: 99px; transition: width .4s ease;
    }
    .grade-mini-pct { font-size: .78rem; font-weight: 600; color: #64748b; min-width: 36px; }

    /* ── 학기 그리드 (같은 학년 1학기·2학기 나란히) ── */
    .semesters-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: start;
    }
    .semester-block {
      width: 100%;
    }
    .semester-label {
      display: flex; align-items: center; gap: 8px;
      font-size: .82rem; font-weight: 600; color: #64748b;
      padding-bottom: 10px; margin-bottom: 14px;
      border-bottom: 1.5px solid #DDE5FF;
    }
    .semester-label::before {
      content: '';
      display: inline-block; width: 3px; height: 14px;
      background: var(--grade-color, #94A7E8); border-radius: 99px;
    }
    .semester-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    /* ── 카드 ── */
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 22px 14px 18px; transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.12); }

    .card-top { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; }

    /* 원형 진행률 */
    .circle-wrap { position: relative; flex-shrink: 0; width: 68px; height: 68px; }
    .circle-wrap svg { transform: rotate(-90deg); width: 68px; height: 68px; }
    .circle-bg  { fill: none; stroke: #EEF2FF; stroke-width: 8; }
    .circle-prog {
      fill: none; stroke-width: 8; stroke-linecap: round;
      transition: stroke-dashoffset .5s ease, stroke .4s ease;
    }
    .circle-pct-text {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      line-height: 1;
    }
    .circle-pct-text .num  { font-size: 1.0rem; font-weight: 700; color: #1e293b; }
    .circle-pct-text .unit { font-size: .52rem; color: #94A7E8; margin-top: 2px; }

    .card-info { flex: 1; min-width: 0; }
    .card-type-badge {
      display: inline-block; font-size: .68rem; font-weight: 600;
      padding: 2px 8px; border-radius: 99px; margin-bottom: 4px; color: #fff;
    }
    .card-title-row { display: flex; align-items: baseline; gap: 8px; }
    .card-title  { font-size: .92rem; font-weight: 700; color: #1e293b; flex: 1; min-width: 0; }
    .card-count  { display: none; }
    .card-count .done-num { font-weight: 700; color: #1e293b; }

    /* ── 체크리스트 ── */
    .checklist { display: flex; flex-direction: column; gap: 3px; }

    .item-main { display: flex; align-items: center; width: 100%; }
    .checklist-item {
      display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
      cursor: pointer; padding: 5px 8px; border-radius: 8px;
      transition: background .15s; user-select: none;
    }
    .item-main:hover .checklist-item { background: #F0F4FF; }
    .checklist-item input[type="checkbox"] { display: none; }
    .item-delete-btn {
      background: none; border: none; cursor: pointer; color: #B0C0EC;
      font-size: .8rem; padding: 0 2px; flex-shrink: 0;
      opacity: 0; transition: opacity .15s; line-height: 1; border-radius: 3px;
    }
    .item-main:hover .item-delete-btn { opacity: 1; }
    .item-delete-btn:hover { color: #dc2626; background: #fee2e2; }
    .drag-handle {
      color: #94A7E8; font-size: .85rem; cursor: grab; flex-shrink: 0;
      padding: 0 2px; line-height: 1; user-select: none;
      display: none;
    }
    .card.sort-mode .drag-handle { display: block; }
    .card.sort-mode .checklist-item { cursor: default; }
    .card.sort-mode .checklist-item input[type="checkbox"] { pointer-events: none; }
    .item-wrap.dragging { opacity: .45; }
    .sort-toggle-btn {
      font-size: .68rem; color: #94A7E8; background: none; border: 1px solid #C0CFFF;
      border-radius: 5px; padding: 2px 7px; cursor: pointer; transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .sort-toggle-btn:hover { color: #42B08A; background: #EEF2FF; }
    .card.sort-mode .sort-toggle-btn { color: #fff; background: #94A7E8; border-color: #94A7E8; }

    .item-expand-btn {
      background: none; border: none; cursor: pointer; color: #B0C0EC;
      font-size: .75rem; padding: 0 3px; flex-shrink: 0; border-radius: 3px;
      opacity: 0; transition: opacity .15s, color .15s; line-height: 1;
      position: relative;
    }
    .item-main:hover .item-expand-btn,
    .item-main.memo-open .item-expand-btn { opacity: 1; }
    .item-expand-btn:hover,
    .item-main.memo-open .item-expand-btn { color: #5068B5; }
    .item-expand-btn.has-memo { opacity: 1; color: #5068B5; }
    .item-expand-btn.has-memo::after {
      content: ''; position: absolute; top: 0; right: -1px;
      width: 5px; height: 5px; background: #dc2626; border-radius: 50%;
    }

    #memo-tooltip {
      position: fixed; z-index: 9999; pointer-events: none;
      background: #1e293b; color: #f8fafc;
      font-size: .7rem; line-height: 1.5;
      padding: 6px 9px; border-radius: 6px;
      white-space: pre-wrap; word-break: break-word;
      max-width: 220px; box-shadow: 0 4px 12px rgba(0,0,0,.25);
      display: none;
    }
    .pri-memo-dot {
      display: inline-block; width: 6px; height: 6px;
      background: #dc2626; border-radius: 50%;
      margin-left: 4px; vertical-align: middle;
      flex-shrink: 0; cursor: default;
    }

    .item-memo-row {
      display: none; padding: 0 8px 8px 38px;
    }
    .item-memo-row.open { display: flex; gap: 6px; align-items: flex-start; }
    .item-memo {
      flex: 1; resize: none; min-height: 48px; border: 1px solid #DDE5FF;
      border-radius: 6px; padding: 6px 8px; font-size: .78rem; color: #334155;
      background: #F0F4FF; font-family: inherit; line-height: 1.4;
    }
    .item-memo:focus { outline: none; border-color: #5068B5; background: #fff; }
    .item-memo-delete {
      background: none; border: 1px solid #fecaca; border-radius: 6px;
      cursor: pointer; color: #dc2626; font-size: .75rem; padding: 4px 8px;
      white-space: nowrap; flex-shrink: 0;
    }
    .item-memo-delete:hover { background: #fee2e2; }

    .status-btn {
      flex-shrink: 0; width: 46px; height: 22px; border-radius: 11px;
      border: 1px solid #C0CFFF; background: #f9f5ef; color: transparent;
      font-size: .6rem; font-weight: 700; cursor: pointer; padding: 0;
      transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap; letter-spacing: -.3px;
    }
    .status-btn[data-status="진행"] { background: #dbeafe; border-color: #93c5fd; color: #1d4ed8; }
    .status-btn[data-status="검수/촬영"] { background: #ede9fe; border-color: #c4b5fd; color: #7c3aed; }
    .status-btn[data-status="완료"] { background: #dcfce7; border-color: #86efac; color: #15803d; }
    .check-label { font-size: .82rem; color: #475569; transition: color .2s; }
    .checklist-item.checked .check-label {
      text-decoration: line-through;
      text-decoration-thickness: 1.5px;
      color: #94A7E8;
    }

    /* 완료 배지 */
    .complete-badge {
      display: none; align-items: center; justify-content: center; gap: 5px;
      margin-top: 12px; padding: 7px 0; border-radius: 8px;
      background: #f0fdf4; color: #16a34a; font-size: .8rem; font-weight: 600;
    }
    .complete-badge svg { width: 14px; height: 14px; }
    .card.all-done .complete-badge { display: flex; }
    .detail-toggle-wrap { display: none; flex-shrink: 0; }
    .detail-toggle-btn {
      font-size: .72rem; color: #94A7E8; background: none; border: none;
      cursor: pointer; text-decoration: underline; padding: 0;
    }
    .detail-toggle-btn:hover { color: #42B08A; }
    /* type-expandable / grade-section all-done 카드: 버튼 표시 */
    .type-expandable .card.all-done .detail-toggle-wrap,
    .grade-section .card.all-done .detail-toggle-wrap { display: block; }
    /* all-done 카드 여백 축소 */
    .type-expandable .card.all-done,
    .grade-section .card.all-done { padding-top: 12px; padding-bottom: 10px; align-self: start; }
    .type-expandable .card.all-done .card-top,
    .grade-section .card.all-done .card-top { margin-bottom: 0; }
    /* show-detail 시 숨겨졌던 내용 복원 + 여백 원복 */
    .type-expandable .card.all-done.show-detail,
    .grade-section .card.all-done.show-detail { padding-top: 22px; padding-bottom: 18px; align-self: stretch; }
    .type-expandable .card.all-done.show-detail .card-top,
    .grade-section .card.all-done.show-detail .card-top { margin-bottom: 16px; }
    .type-expandable .card.all-done.show-detail .checklist,
    .type-expandable .card.all-done.show-detail .add-item-row { display: flex; }
    .type-expandable .card.all-done.show-detail .complete-badge { display: flex; }
    .grade-section .card.all-done.show-detail .checklist,
    .grade-section .card.all-done.show-detail .add-item-row { display: flex; }
    .grade-section .card.all-done.show-detail .complete-badge { display: flex; }
    .card-pending-footer {
      display: none; align-items: center; justify-content: flex-end; gap: 8px;
      margin: 10px -14px -18px; padding: 8px 14px 12px;
      border-top: 1px solid #DDE5FF; background: #fffdf7; border-radius: 0 0 16px 16px;
    }
    .card-pending-footer.visible { display: flex; }
    .cpf-cancel {
      padding: 4px 10px; border-radius: 8px; border: 1px solid #C0CFFF;
      background: #fff; color: #78716c; font-size: .75rem; cursor: pointer;
    }
    .cpf-apply {
      padding: 4px 12px; border-radius: 8px; border: 1px solid #22c55e;
      background: #f0fdf4; color: #15803d; font-size: .75rem; font-weight: 600; cursor: pointer;
    }
    .cpf-cancel:hover { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }
    .cpf-apply:hover  { background: #dcfce7; }
    .item-wrap.card-item-pending { background: #F0F4FF; border-radius: 8px; }

    /* ─── 자료준비 로드맵 ─── */
    #roadmap-section {
      background: #fff;
      border-bottom: 1px solid #DDE5FF;
      box-shadow: 0 2px 6px rgba(0,0,0,.04);
    }
    .roadmap-wrapper { max-width: 1200px; margin: 0 auto; padding: 24px 24px 28px; }
    .roadmap-title {
      font-size: .9rem; font-weight: 700; color: #1e293b;
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .roadmap-body { display: flex; gap: 14px; align-items: stretch; }
    .roadmap-left { flex: 1; min-width: 0; overflow-x: auto; }

    /* 구간 띠 */
    .roadmap-band {
      display: flex; min-width: max-content;
      border: 1.5px solid #DDE5FF; border-radius: 12px; overflow: visible;
    }
    .rm-seg {
      flex: 1; min-width: 130px; padding: 20px 16px;
      position: relative; border-right: 1px solid #DDE5FF;
      cursor: default; transition: filter .15s;
    }
    .rm-seg:first-child { border-radius: 10px 0 0 10px; }
    .rm-seg:last-child  { border-radius: 0 10px 10px 0; border-right: none; }
    .rm-seg::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 4px; border-radius: 4px 4px 0 0;
    }
    .rm-seg.seg-green  { background: #f0fdf4; }
    .rm-seg.seg-green::before  { background: #16a34a; }
    .rm-seg.seg-yellow { background: #fefce8; }
    .rm-seg.seg-yellow::before { background: #eab308; }
    .rm-seg.seg-red    { background: #fff1f2; }
    .rm-seg.seg-red::before    { background: #ef4444; }

    .rm-seg-period { font-size: .68rem; font-weight: 700; margin-bottom: 5px; }
    .rm-seg.seg-green  .rm-seg-period { color: #16a34a; }
    .rm-seg.seg-yellow .rm-seg-period { color: #a16207; }
    .rm-seg.seg-red    .rm-seg-period { color: #dc2626; }

    .rm-seg-pct { font-size: 1.25rem; font-weight: 800; line-height: 1; margin-bottom: 7px; }
    .rm-seg.seg-green  .rm-seg-pct { color: #16a34a; }
    .rm-seg.seg-yellow .rm-seg-pct { color: #a16207; }
    .rm-seg.seg-red    .rm-seg-pct { color: #dc2626; }

    .rm-bar-track { height: 6px; border-radius: 99px; overflow: hidden; margin-bottom: 5px; }
    .rm-seg.seg-green  .rm-bar-track { background: #dcfce7; }
    .rm-seg.seg-yellow .rm-bar-track { background: #fef9c3; }
    .rm-seg.seg-red    .rm-bar-track { background: #fee2e2; }
    .rm-bar-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
    .rm-seg.seg-green  .rm-bar-fill { background: #16a34a; }
    .rm-seg.seg-yellow .rm-bar-fill { background: #eab308; }
    .rm-seg.seg-red    .rm-bar-fill { background: #ef4444; }

    .rm-seg-count { font-size: .62rem; color: #94A7E8; }

    /* 자료목록 (상시 표시) */
    .rm-tooltip {
      display: block; position: static; transform: none;
      margin-top: 10px; min-width: unset;
      background: rgba(30,41,59,.07); color: #334155; border-radius: 8px;
      padding: 8px 10px; font-size: .68rem; pointer-events: none;
    }
    .rm-tooltip::before { display: none; }
    .rm-tt-title { font-weight: 700; color: #42B08A; font-size: .63rem; margin-bottom: 6px; letter-spacing: .04em; }
    .rm-tt-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
    .rm-tt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .rm-tt-dot.done { background: #16a34a; }
    .rm-tt-dot.todo { background: #ef4444; }

    /* 우선작업 체크리스트 패널 */
    .priority-panel {
      width: 280px; flex-shrink: 0;
      border: 1.5px solid #DDE5FF; border-radius: 12px;
      display: flex; flex-direction: column; overflow: hidden; background: #fff;
    }
    .pri-header {
      padding: 10px 14px; border-bottom: 1px solid #EEF2FF;
      font-size: .78rem; font-weight: 700; color: #1e293b;
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      background: #F5F7FF;
    }
    .pri-badge {
      margin-left: auto; font-size: .65rem; font-weight: 700;
      background: #ef4444; color: #fff; padding: 1px 6px; border-radius: 99px;
    }
    .pri-list { overflow-y: auto; flex: 1; padding: 4px 0; min-height: 80px; max-height: 260px; }
    .pri-empty {
      padding: 20px 14px; text-align: center; font-size: .75rem; color: #94A7E8; line-height: 1.6;
    }
    .pri-item { padding: 5px 12px; display: flex; align-items: flex-start; gap: 8px; }
    .pri-check-label { flex-shrink: 0; display: flex; cursor: pointer; user-select: none; padding-top: 1px; }
    .pri-body { flex: 1; min-width: 0; }
    .pri-top-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    /* ── 우선작업 마감기한·담당자 태그 & 더블클릭 편집 ── */
    .pri-controls {
      display: flex; flex-direction: row; align-items: center;
      gap: 3px; flex-shrink: 0; margin-left: auto;
    }
    .pri-ctrl-wrap { position: relative; display: inline-flex; }
    .pri-meta-tag {
      display: inline-flex; align-items: center; justify-content: center; gap: 3px;
      width: 52px; height: 20px; flex-shrink: 0;
      font-size: .65rem; font-weight: 600; border-radius: 4px; overflow: hidden;
      cursor: pointer; user-select: none; white-space: nowrap; transition: opacity .15s;
    }
    .pri-meta-tag:hover { opacity: .75; }
    .pri-meta-tag.date-empty   { background: #EEF2FF; color: #94A7E8; border: 1px dashed #B8C8F5; }
    .pri-meta-tag.date-overdue { background: #fff1f2; color: #dc2626; border: 1px solid #fecdd3; }
    .pri-meta-tag.date-soon    { background: #fef9c3; color: #a16207; border: 1px solid #fde68a; }
    .pri-meta-tag.date-ok      { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    /* 편집 입력 — 기본 숨김, .editing 시 노출 */
    .pri-ctrl-wrap .pri-edit-input { display: none; }
    .pri-ctrl-wrap.editing .pri-meta-tag { display: none; }
    .pri-ctrl-wrap.editing .pri-edit-input {
      display: inline-block; font-family: inherit; font-size: .65rem;
      border: 1.5px solid #5068B5; border-radius: 4px;
      padding: 2px 5px; outline: none; color: #1e293b; background: #fff;
    }
    .pri-ctrl-wrap.editing input[type="date"] { width: 100px; }
    .pri-ctrl-wrap.editing select[size] {
      position: absolute; right: 0; top: 100%; z-index: 50;
      display: block; background: #fff; border: 1.5px solid #5068B5 !important;
      border-radius: 8px; min-width: 88px; padding: 3px 0;
      box-shadow: 0 4px 14px rgba(0,0,0,.14); outline: none;
      font-family: inherit; font-size: .72rem; color: #1e293b;
    }
    .pri-ctrl-wrap.editing select[size] option { padding: 5px 12px; cursor: pointer; }
    .pri-item .status-btn { margin-top: 1px; }
    .pri-card-name { font-size: .7rem; font-weight: 600; color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .pri-name-row { display: flex; align-items: center; gap: 4px; }
    .pri-item-name { font-size: .67rem; color: #64748b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

    /* ── 담당자 입력 ── */
    .item-col { flex: 1; min-width: 0; display: flex; flex-direction: row; align-items: center; gap: 4px; }
    .check-label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 마감기한 인라인 입력 */
    .deadline-display {
      flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center;
      width: 52px; height: 18px; border: 1px solid #DDE5FF; border-radius: 4px;
      background: #F0F4FF; font-size: .6rem; color: #5068B5; cursor: pointer;
      font-family: inherit; box-sizing: border-box;
    }
    .checklist-item.checked .deadline-display { color: #94A7E8; border-color: #ece7e0; background: #fafafa; }
    .deadline-input {
      position: fixed; left: -9999px; top: -9999px;
      width: 0; height: 0; opacity: 0; pointer-events: none;
      border: none; outline: none; background: transparent; font-family: inherit;

    /* ── 학년 토글 ── */

    /* ── 좌측 사이드바 내비게이션 ── */
    #top-nav {

      background: #fff; border-right: 1px solid #DDE5FF;

    .assignee-select {

      border: none; outline: none; background: transparent; font-family: inherit;

      transition: border-color .15s;
    }

    .item-main:has(.checklist-item.has-assignee) .assignee-select { border-bottom-color: #F8B84A; font-weight: 600; }
    .item-main:has(.checklist-item.checked) .assignee-select { color: #94A7E8; border-bottom-color: #B8C8F5; }

    /* ── 항목 상세 버튼 ── */
    .item-detail-btn {
      width: 22px; height: 22px; flex-shrink: 0;
      border: none; background: transparent; cursor: pointer;
      font-size: .78rem; color: #B8C8F5; padding: 0; line-height: 1;
      display: flex; align-items: center; justify-content: center;

      letter-spacing: -.5px;
    }

    /* ── 자료유형별 섹션 ── */
    /* ── 신규 업무 추가 폼 ── */
    #add-task-section { background: #fff; border-bottom: 1px solid #DDE5FF; }
    .at-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px 24px 26px; }

      display: flex; align-items: center; justify-content: space-between;

    }

      background: none; border: 1.5px solid #DDE5FF; border-radius: 50%;
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #64748b; flex-shrink: 0; transition: background .15s, border-color .15s;
    }
    .at-toggle-btn:hover { background: #EEF2FF; border-color: #C0CFFF; }

    .at-fields {

    .at-field-hidden { display: none !important; }
    /* 직접입력 선택 시에만 유형명 입력 칸 표시 */

      border: 1.5px solid #DDE5FF; border-radius: 6px;

    .at-input-date { width: 128px; }
    /* ── 커스텀 담당자 드롭다운 ── */
    .at-custom-select-wrap { position: relative; }
    .at-custom-select-btn {
      display: flex; align-items: center; gap: 6px;
      border: 1.5px solid #DDE5FF; border-radius: 6px;

    .at-submit:disabled { background: #B0C0EC; cursor: not-allowed; }
    #type-section { background: #F0F4FF; border-bottom: 1px solid #DDE5FF; }
    .type-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px 24px 26px; }

    .grade-section .card.all-done .complete-badge { display: none; }

    /* ── 항목 상세 모달 ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 440px; margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px; background: #F0F4FF; border-bottom: 1px solid #DDE5FF;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .modal-header-texts { flex: 1; min-width: 0; }
    .modal-header-title { font-size: .9rem; font-weight: 700; color: #1e293b; margin-bottom: 2px; }
    .modal-header-sub { font-size: .72rem; color: #94A7E8; }
    .modal-close {
      width: 28px; height: 28px; border: none; background: transparent;
      cursor: pointer; border-radius: 50%; font-size: 1rem; color: #64748b;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: background .15s;
    }
    .modal-close:hover { background: #EEF2FF; }
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .modal-field { display: flex; flex-direction: column; gap: 5px; }

    .modal-field input, .modal-field select, .modal-field textarea {
      border: 1.5px solid #DDE5FF; border-radius: 8px;
      padding: 8px 12px; font-family: inherit; font-size: .82rem; color: #1e293b;

    .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: #5068B5; }
    .modal-field textarea { resize: vertical; min-height: 72px; }

      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 99px; font-size: .75rem; font-weight: 600;
    }
    .modal-status-badge.done { background: #dcfce7; color: #16a34a; }
    .modal-status-badge.todo { background: #fee2e2; color: #dc2626; }

      padding: 14px 20px; border-top: 1px solid #DDE5FF;
      display: flex; gap: 8px; justify-content: flex-end;
    }
    .modal-btn {

    .modal-btn-cancel { background: #EEF2FF; color: #64748b; }
    .modal-btn-cancel:hover { background: #DDE5FF; }

    /* ── 로딩 오버레이 ── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(253,246,237,.94);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px;
    }
    #loading-overlay .loading-text { font-size: .95rem; font-weight: 600; color: #42B08A; }
    #loading-overlay .loading-sub  { font-size: .75rem; color: #94A7E8; }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 4px solid #DDE5FF; border-top-color: #42B08A;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 반응형 ── */
    @media (max-width: 640px) {
      body { padding-left: 0; }
      header { display: none; }
      main { padding: 16px 14px 48px; }
      .semesters-grid { flex-wrap: wrap; }
      .semester-block { width: 100%; }
      .semester-cards { flex-wrap: wrap; }
      .semester-cards .card { width: 100%; flex-shrink: 1; }

      #type-section.mob-visible .type-wrapper { padding: 14px 14px 48px; }
      #type-section.mob-visible .type-grid { flex-direction: column; gap: 36px; }
      #type-section.mob-visible .type-card {
        flex: none; background: transparent; border: none; padding: 0; border-radius: 0;
      }
      /* 헤더: grade-header와 동일한 스타일 */

        display: flex; align-items: center; gap: 10px;
        margin-bottom: 14px; padding: 0; background: transparent; border: none;
      }
      #type-section.mob-visible .type-card-name {
        font-size: 1.1rem; font-weight: 700; color: #1e293b; margin-bottom: 0;
      }
      #type-section.mob-visible .type-dot {
        width: 32px; height: 32px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; font-size: .8rem; font-weight: 700; color: #fff;
      }
      /* 진행률 바: grade-mini-bar와 동일 */
      #type-section.mob-visible .type-bar-track {
        flex: 1; height: 6px; max-width: 180px; margin-bottom: 0;
      }
      #type-section.mob-visible .type-stats { display: none; }
      /* 토글 버튼: grade-toggle과 동일 */
      #type-section.mob-visible .type-expand-btn {
        display: flex; width: 28px; height: 28px; border-radius: 50%;
        border: 1.5px solid #DDE5FF; background: #fff;
        align-items: center; justify-content: center;
        cursor: pointer; flex-shrink: 0; margin-left: auto; color: #64748b;
        transition: background .15s, border-color .15s;
      }
      #type-section.mob-visible .type-expand-btn:hover { background: #EEF2FF; border-color: #C0CFFF; }
      #type-section.mob-visible .type-card.type-open .type-expand-btn svg { transform: rotate(180deg); }
      /* 펼침 영역: 카드 전체 너비 */
      #type-section.mob-visible .type-expandable {
        margin-top: 0; border-top: none; padding-top: 0;
        display: none;
      }
      #type-section.mob-visible .type-card.type-open .type-expandable { display: block; }
      #type-section.mob-visible .type-expandable .card {
        width: 100%; box-sizing: border-box; margin-bottom: 14px;
      }
      #type-section.mob-visible .type-expandable .card:last-child { margin-bottom: 0; }

      /* 모바일 탭 뷰: 섹션 기본 숨김 */
      #roadmap-section, #assignee-section, #type-section, #main, #add-task-section, #schedule-section { display: none; }
      #roadmap-section.mob-visible, #assignee-section.mob-visible,
      #type-section.mob-visible, #main.mob-visible,
      #add-task-section.mob-visible, #schedule-section.mob-visible { display: block; }

      /* 모바일: 사이드바 → 상단 고정 탭 바 */
      #top-nav {
        position: sticky; top: 0; left: auto; bottom: auto; width: 100%;
        flex-direction: row; border-right: none;
        border-bottom: 1px solid #DDE5FF; box-shadow: 0 1px 4px rgba(0,0,0,.06);
        z-index: 200;
      }
      .nav-logo { display: none; }
      .nav-wrapper { flex-direction: row; overflow-x: auto; padding: 0; }
      #assigneeSubMenu { display: contents; }
      .nav-item, .nav-sub-item {
        border-left: none; border-bottom: 2px solid transparent;
        padding: 12px 14px; font-size: .78rem; font-weight: 600; color: #64748b;
        white-space: nowrap;
      }
      .nav-item:hover, .nav-sub-item:hover,
      .nav-item.mob-active, .nav-sub-item.mob-active {
        border-left-color: transparent; border-bottom-color: #5068B5;
        color: #42B08A; background: #F0F4FF;
      }
      /* 탭 순서: 일정 → 우선순위 → 담당자별 → 자료유형별 → 학년별 → 신규업무추가 */
      #nav-schedule  { display: block; order: 1; }
      #nav-priority  { display: block; order: 2; }
      #nav-assignee  { display: none; }
      .nav-sub-item  { order: 3; }
      #nav-type      { order: 4; }
      #nav-grade     { order: 5; }
      #nav-add       { order: 6; }
      /* 로드맵 제목·내부탭 숨김 */
      .roadmap-title { display: none; }
      #mobileTabs    { display: none !important; }
      /* 담당자 추가 버튼 숨김 */
      #assigneeAddRow { display: none !important; }
      /* 우선작업 체크리스트 높이 제한 해제 */
      .pri-list { max-height: none; }
      /* 페이지 타이틀 */
      #mob-page-title {
        display: block; padding: 12px 16px 8px;
        font-size: .9rem; font-weight: 700; color: #1e293b;
        border-bottom: 1px solid #EEF2FF; background: #fff;
      }

      /* 담당자별 패널 모바일 */
      .assignee-grid { flex-wrap: wrap; }
      .assignee-card { flex: 0 0 100%; }
      .ac-delete { display: none; }
      .assignee-card-header { flex-wrap: wrap; gap: 5px; padding: 10px 10px 6px; }
      .ac-toggle { display: none; }
      .assignee-card.collapsed .assignee-items { display: block; }
      /* 자료유형별 모바일 */
      .type-grid { flex-direction: column; }
      .type-expand-btn { display: flex; align-items: center; }
      /* 우선작업: 헤더 고정 + 목록만 스크롤 */
      .priority-panel {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto 1fr;
        grid-template-areas: "header actions" "list list";
        height: calc(100vh - 76px);
        height: calc(100dvh - 76px);
        overflow: hidden;
      }
      .pri-header { grid-area: header; border-bottom: none; }
      .pri-footer {
        grid-area: actions; border-top: none;
        border-bottom: 1px solid #EEF2FF; background: #F5F7FF;
        padding: 0 8px; align-items: center; gap: 4px;
      }
      .pri-list {
        grid-area: list;
        border-top: 1px solid #EEF2FF;
        overflow-y: auto;
        min-height: 0;
        max-height: none;
      }
      .pri-badge { display: none; }
      .pri-apply-btn { flex: none; padding: 4px 10px; font-size: .72rem; }
      .pri-cancel-btn { padding: 4px 8px; font-size: .72rem; }
      /* 학년별·유형별 공통: 100% 완료 카드는 헤더만 표시 */
      .grade-section .card.all-done .checklist,
      .grade-section .card.all-done .add-item-row,
      .grade-section .card.all-done .add-item-input-row,
      .grade-section .card.all-done .complete-badge { display: none; }
      /* 체크리스트 아이템: 일정·담당자·메모 태그 인라인 표시 */
      .item-col { flex-direction: row; align-items: center; gap: 4px; }
      .check-label { flex: 1; min-width: 40px; }
      .deadline-display {
        flex-shrink: 0; width: 60px; height: 18px;
        display: inline-flex; align-items: center; justify-content: center;
        border: 1px solid #DDE5FF; border-radius: 4px; background: #F0F4FF;
        font-size: .6rem; color: #5068B5; cursor: pointer;
        font-family: inherit; box-sizing: border-box;
      }
      .checklist-item.checked .deadline-display {
        color: #94A7E8; border-color: #ece7e0; background: #fafafa;
      }
      .assignee-select {
        flex-shrink: 0; width: 54px; height: 18px;
        border: 1px solid #DDE5FF !important;
        border-bottom: 1px solid #DDE5FF !important;
        border-radius: 4px; background: #F0F4FF;
        padding: 0 2px; font-size: .6rem; box-sizing: border-box;
      }
      .item-main:has(.checklist-item.checked) .assignee-select {
        border-color: #DDE5FF !important; background: #fafafa;
      }
      .item-main .item-expand-btn { opacity: 1 !important; font-size: .78rem; }
      .item-main .item-delete-btn { display: none; }
      .card.sort-mode .drag-handle { opacity: 1 !important; }
      .status-btn { width: 40px; height: 18px; font-size: .58rem; }
    }

    /* ── 업무 추가 ── */
    .add-item-row { padding: 4px 8px 2px; display: flex; align-items: center; justify-content: space-between; }
    .add-item-btn {
      display: flex; align-items: center; gap: 4px;
      font-size: .72rem; color: #94A7E8; background: none; border: none;
      cursor: pointer; padding: 4px 8px; border-radius: 6px;
      transition: color .15s, background .15s;
    }
    .add-item-btn:hover { color: #42B08A; background: #EEF2FF; }
    .add-item-input-row {
      display: none; align-items: center; gap: 5px;
      padding: 4px 8px 8px;
    }
    .add-item-input-row.active { display: flex; }
    .add-item-input {
      flex: 1; border: 1.5px solid #DDE5FF; border-radius: 6px;
      padding: 4px 8px; font-family: inherit; font-size: .78rem; outline: none;
      transition: border-color .15s;
    }
    .add-item-input:focus { border-color: #5068B5; }
    .add-item-confirm, .add-item-cancel {
      padding: 3px 9px; border-radius: 6px; border: none; flex-shrink: 0;
      font-family: inherit; font-size: .72rem; font-weight: 600; cursor: pointer;
    }
    .add-item-confirm { background: #42B08A; color: #fff; }
    .add-item-cancel  { background: #DDE5FF; color: #64748b; }

    /* ── 우선작업 반영/취소 ── */
    .pri-footer {
      display: none; gap: 6px; padding: 8px 12px;
      border-top: 1px solid #EEF2FF; flex-shrink: 0;
    }
    .pri-footer.visible { display: flex; }
    .pri-apply-btn {
      flex: 1; padding: 6px 0; border-radius: 7px; border: none;
      background: #42B08A; color: #fff; font-family: inherit;
      font-size: .78rem; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .pri-apply-btn:hover { background: #2D9676; }
    .pri-cancel-btn {
      padding: 6px 14px; border-radius: 7px; border: none;
      background: #EEF2FF; color: #64748b; font-family: inherit;
      font-size: .78rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .pri-cancel-btn:hover { background: #DDE5FF; }
    .pri-item.pri-pending { background: #F0F4FF; border-radius: 6px; }

    /* ── 담당자 추가/삭제 ── */
    .assignee-title-wrap {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      position: sticky; top: 0; z-index: 10;
      background: #F0F4FF;
      margin: -20px -24px 10px;
      padding: 20px 24px 10px;
    }
    .assignee-title { margin-bottom: 0 !important; }
    /* 접힌 상태: 작은 버튼 */
    .assignee-add-row { margin-bottom: 14px; }
    .assignee-add-trigger {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .73rem; color: #94A7E8; background: none;
      border: 1.5px dashed #B8C8F5; cursor: pointer;
      padding: 4px 12px; border-radius: 6px; font-family: inherit;
      transition: color .15s, border-color .15s; user-select: none;
    }
    .assignee-add-trigger:hover { color: #42B08A; border-color: #5068B5; }
    /* 펼쳐진 상태 */
    .assignee-add-form {
      display: none; align-items: center; gap: 8px;
      background: #fffdf9; border: 1.5px dashed #C0CFFF;
      border-radius: 8px; padding: 7px 12px;
    }
    .assignee-add-row.open .assignee-add-trigger { display: none; }
    .assignee-add-row.open .assignee-add-form { display: flex; }
    .assignee-new-input {
      flex: 1; min-width: 0;
      border: 1.5px solid #DDE5FF; border-radius: 6px;
      padding: 4px 8px; font-family: inherit; font-size: .78rem; outline: none;
      transition: border-color .15s; background: #fff;
    }
    .assignee-new-input:focus { border-color: #5068B5; }
    .assignee-new-confirm, .assignee-new-cancel {
      padding: 4px 10px; border-radius: 6px; border: none;
      font-family: inherit; font-size: .73rem; font-weight: 600; cursor: pointer;
      white-space: nowrap;
    }
    .assignee-new-confirm { background: #42B08A; color: #fff; }
    .assignee-new-cancel  { background: #DDE5FF; color: #64748b; }
    /* 담당자 삭제 버튼 */
    .ac-delete {
      background: none; border: none; cursor: pointer;
      color: #B0C0EC; font-size: .85rem; line-height: 1;
      padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
      transition: color .15s; margin-left: 2px;
    }
    .ac-delete:hover { color: #dc2626; }

    /* ── 모바일 탭 ── */
    .mobile-tabs {
      display: none; overflow-x: auto; gap: 6px; margin-bottom: 14px;
      -webkit-overflow-scrolling: touch; padding-bottom: 2px;
    }
    .mobile-tab {
      flex-shrink: 0; padding: 6px 16px; border-radius: 20px;
      font-size: .78rem; font-weight: 600; cursor: pointer;
      border: 1.5px solid #DDE5FF; background: #fff; color: #64748b;
      font-family: inherit; transition: all .15s;
    }
    .mobile-tab.active { background: #42B08A; color: #fff; border-color: #42B08A; }
    .mobile-assignee-panel {
      display: none; border: 1.5px solid #DDE5FF;
      border-radius: 12px; overflow: hidden; background: #fff;
    }
    .mobile-ap-header {
      padding: 10px 14px; border-bottom: 1px solid #DDE5FF;
      display: flex; align-items: center; gap: 7px; background: #F0F4FF;
      position: sticky; top: 0; z-index: 5;
    }
    @media (max-width: 640px) {
      .mobile-tabs { display: flex; }
      .roadmap-left { display: none !important; }
      .priority-panel { width: 100%; max-height: none; }
      #assignee-section { display: none; }
    }

    /* ── 일정 캘린더 섹션 ── */
    #schedule-section {
      background: #fff;
      border-bottom: 1px solid #DDE5FF;
      box-shadow: 0 2px 6px rgba(0,0,0,.04);
      overflow-x: hidden;
    }
    .schedule-wrapper { max-width: 1200px; margin: 0 auto; padding: 24px 24px 32px; width: 100%; box-sizing: border-box; overflow-x: hidden; }
    .schedule-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .schedule-title { font-size: .9rem; font-weight: 700; color: #1e293b; }
    .cal-nav-group { display: flex; align-items: center; gap: 8px; }
    .cal-nav-btn {
      width: 30px; height: 30px; border: 1.5px solid #DDE5FF;
      border-radius: 50%; background: #fff; cursor: pointer;
      color: #64748b; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s; flex-shrink: 0;
    }
    .cal-nav-btn:hover { background: #EEF2FF; border-color: #C0CFFF; }
    .cal-month-label {
      font-size: .92rem; font-weight: 700; color: #1e293b;
      min-width: 90px; text-align: center;
    }
    .cal-today-btn {
      font-size: .72rem; color: #5068B5; border: 1.5px solid #C0CFFF;
      background: #fff; border-radius: 99px; padding: 3px 10px; cursor: pointer;
      transition: background .15s;
    }
    .cal-today-btn:hover { background: #EEF2FF; }
    .cal-legend { display: flex; gap: 12px; align-items: center; margin-left: auto; }
    .cal-legend-dot {
      display: inline-block; width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .cal-legend-item {
      display: flex; align-items: center; gap: 5px;
      font-size: .74rem; color: #64748b;
    }
    .cal-grid-wrap {
      border: 1.5px solid #DDE5FF; border-radius: 12px; overflow: hidden;
      width: 100%; box-sizing: border-box;
    }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(5, minmax(0, 1fr));
      width: 100%; background: #F0F4FF; border-bottom: 1.5px solid #DDE5FF;
    }
    .cal-weekday {
      text-align: center; padding: 8px 4px;
      font-size: .74rem; font-weight: 700; color: #64748b;
      min-width: 0; overflow: hidden;
    }
    .cal-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); width: 100%; }
    .cal-day {
      min-height: 90px; border-right: 1px solid #EEF2FF; border-bottom: 1px solid #EEF2FF;
      padding: 6px 6px 4px; background: #fff; transition: background .15s;
      min-width: 0; overflow: hidden;
    }
    .cal-day:nth-child(5n) { border-right: none; }
    .cal-day.other-month { background: #FAFBFF; }
    .cal-day.other-month .cal-day-num { color: #C0CFFF; }
    .cal-day.today { background: #FFFBF0; }
    .cal-day:hover { background: #F8FAFF; }
    .cal-day-num {
      font-size: .82rem; font-weight: 600; color: #334155;
      line-height: 1; margin-bottom: 4px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
    }
    .cal-day.today .cal-day-num { background: #5068B5; color: #fff; }
    /* 학년 필터 버튼 */
    .cal-grade-filter { display: flex; gap: 6px; align-items: center; }
    .cal-filter-btn {
      font-size: .74rem; font-weight: 600; padding: 4px 12px;
      border-radius: 99px; border: 1.5px solid #DDE5FF;
      background: #fff; color: #64748b; cursor: pointer;
      transition: all .15s;
    }
    .cal-filter-btn:hover { border-color: #C0CFFF; background: #F0F4FF; }
    .cal-filter-btn.active { background: #5068B5; color: #fff; border-color: #5068B5; }
    .cal-filter-btn[data-grade="grade3"].active { background: #F472B6; border-color: #F472B6; }
    .cal-filter-btn[data-grade="grade4"].active { background: #FBBF24; border-color: #FBBF24; color: #78350F; }
    .cal-events { display: flex; flex-direction: column; gap: 2px; }
    .cal-event {
      font-size: .68rem; font-weight: 500;
      padding: 2px 5px; border-radius: 4px;
      cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      transition: opacity .15s; line-height: 1.3;
    }
    .cal-event:hover { opacity: .75; }
    .cal-event.more {
      background: none !important; color: #94A7E8 !important;
      font-size: .65rem; padding: 1px 5px; cursor: pointer;
    }
    .cal-loading {
      grid-column: 1/-1; text-align: center;
      padding: 40px; color: #94A7E8; font-size: .85rem;
    }
    .cal-error {
      grid-column: 1/-1; text-align: center; padding: 20px;
      color: #dc2626; font-size: .8rem;
      background: #fef2f2; border-radius: 8px; margin: 12px;
    }
    .cal-config-notice {
      grid-column: 1/-1; padding: 16px; text-align: center;
      color: #94A7E8; font-size: .8rem; border-top: 1px dashed #DDE5FF;
    }
    /* 캘린더 편집 모드 */
    .cal-edit-btn {
      font-size: .74rem; font-weight: 600; padding: 4px 12px;
      border-radius: 99px; border: 1.5px solid #DDE5FF;
      background: #fff; color: #64748b; cursor: pointer;
      transition: all .15s; display: flex; align-items: center; gap: 5px;
    }
    .cal-edit-btn:hover { border-color: #5068B5; color: #5068B5; background: #EEF2FF; }
    .cal-edit-btn.logged-in { background: #5068B5; color: #fff; border-color: #5068B5; }
    .cal-edit-btn.logged-in:hover { background: #3a52a3; }
    .cal-day.edit-mode { cursor: pointer; }
    .cal-day.edit-mode:hover { background: #EEF2FF; }
    .cal-event-del {
      display: none; margin-left: 3px; color: inherit; opacity: .6;
      font-size: .65rem; cursor: pointer; flex-shrink: 0;
    }
    .edit-mode-active .cal-event { display: flex; align-items: center; justify-content: space-between; }
    .edit-mode-active .cal-event-del { display: inline; }
    /* 일정 추가/수정 모달 */
    .cal-form-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 700;
      align-items: center; justify-content: center;
    }
    .cal-form-overlay.open { display: flex; }
    .cal-form-box {
      background: #fff; border-radius: 16px;
      width: 100%; max-width: 400px; margin: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25); overflow: hidden;
    }
    .cal-form-header {
      padding: 14px 16px; background: #F0F4FF;
      border-bottom: 1px solid #DDE5FF;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cal-form-title { font-size: .9rem; font-weight: 700; color: #1e293b; }
    .cal-form-close {
      width: 28px; height: 28px; border: none; background: transparent;
      cursor: pointer; border-radius: 50%; font-size: 1rem; color: #64748b;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .cal-form-close:hover { background: #EEF2FF; }
    .cal-form-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .cal-form-field { display: flex; flex-direction: column; gap: 5px; }
    .cal-form-field label { font-size: .75rem; font-weight: 600; color: #64748b; }
    .cal-form-field input, .cal-form-field select, .cal-form-field textarea {
      border: 1.5px solid #DDE5FF; border-radius: 8px;
      padding: 8px 10px; font-size: .82rem; font-family: inherit;
      color: #1e293b; outline: none; transition: border-color .15s;
    }
    .cal-form-field input:focus, .cal-form-field select:focus { border-color: #5068B5; }
    .cal-form-row { display: flex; gap: 8px; }
    .cal-form-row .cal-form-field { flex: 1; }
    .cal-form-footer {
      padding: 12px 16px; border-top: 1px solid #DDE5FF;
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .cal-form-cancel {
      padding: 7px 16px; border-radius: 8px; border: 1.5px solid #DDE5FF;
      background: #fff; color: #64748b; font-size: .8rem; cursor: pointer;
    }
    .cal-form-save {
      padding: 7px 16px; border-radius: 8px; border: none;
      background: #5068B5; color: #fff; font-size: .8rem; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .cal-form-save:hover { background: #3a52a3; }
    .cal-form-delete {
      padding: 7px 16px; border-radius: 8px; border: 1.5px solid #fca5a5;
      background: #fff; color: #dc2626; font-size: .8rem; cursor: pointer; margin-right: auto;

/* ─── 전역 담당자 목록 ─── */
const ASSIGNEE_COLOR_MAP = {
  '민주': '#F8B84A', '찬희': '#E86050', '대표님': '#42B08A', '미정': '#94A7E8'
};
const _EXTRA_COLORS = ['#7c3aed','#2563eb','#0891b2','#059669','#dc2626','#be185d'];
let _nextColorIdx = 0;
let AOPTS = ['민주','찬희','대표님','미정'];
(function () {
  const extra  = JSON.parse(localStorage.getItem('extra-assignees')  || '[]');
  const hidden = JSON.parse(localStorage.getItem('hidden-assignees') || '[]');
  extra.forEach(n => {
    if (!AOPTS.includes(n)) {
      /* '미정'이 항상 맨 끝에 오도록 그 앞에 삽입 */
      const mi = AOPTS.indexOf('미정');
      if (mi !== -1) AOPTS.splice(mi, 0, n); else AOPTS.push(n);
      ASSIGNEE_COLOR_MAP[n] = _EXTRA_COLORS[_nextColorIdx++ % _EXTRA_COLORS.length];
    }
  });
  hidden.forEach(n => {
    const i = AOPTS.indexOf(n);
    if (i !== -1) { AOPTS.splice(i, 1); delete ASSIGNEE_COLOR_MAP[n]; }
  });
})();

/* 신규업무추가 — 직접입력 칸 토글 (전역, IIFE 외부) */
function toggleAtCustom(sel) {
  var inp = document.getElementById('atTypeCustom');
  if (!inp) return;
  inp.style.display = sel.value === 'custom' ? 'block' : 'none';
  if (sel.value === 'custom') inp.focus();
}

function addAssignee(name) {
  name = name.trim();
  if (!name || AOPTS.includes(name)) return false;
  const color = _EXTRA_COLORS[_nextColorIdx++ % _EXTRA_COLORS.length];
  /* '미정'이 항상 맨 끝에 오도록 그 앞에 삽입 */
  const mijeongIdx = AOPTS.indexOf('미정');
  if (mijeongIdx !== -1) AOPTS.splice(mijeongIdx, 0, name);
  else AOPTS.push(name);
  ASSIGNEE_COLOR_MAP[name] = color;
  /* extra-assignees에 저장, hidden-assignees에서 제거 */
  const extras = JSON.parse(localStorage.getItem('extra-assignees') || '[]');
  if (!extras.includes(name)) { extras.push(name); localStorage.setItem('extra-assignees', JSON.stringify(extras)); }
  const hidden = JSON.parse(localStorage.getItem('hidden-assignees') || '[]');
  const newHidden = hidden.filter(n => n !== name);
  localStorage.setItem('hidden-assignees', JSON.stringify(newHidden));
  /* 모든 선택 드롭다운에 옵션 추가 — '미정' 앞에 삽입 */
  document.querySelectorAll('.assignee-select, #modal-assignee-select, .pri-assignee-select, #atAssignee').forEach(sel => {
    if ([...sel.options].some(o => o.value === name)) return;
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    const mijeongOpt = [...sel.options].find(o => o.value === '미정');
    if (mijeongOpt) sel.insertBefore(opt, mijeongOpt);
    else sel.appendChild(opt);
  });
  return true;
}

function removeAssignee(name) {
  if (name === '미정') return; /* 미정은 삭제 불가 */
  const idx = AOPTS.indexOf(name);
  if (idx === -1) return;

  /* 해당 담당자가 맡은 업무를 미정으로 재배정 */
  for (const grade of GRADES) {
    for (const sem of grade.semesters) {
      for (const card of sem.cards) {
        const totalItems = card.items.length +
          (JSON.parse(localStorage.getItem('extra-items-' + card.id) || '[]')).length;
        for (let i = 0; i < totalItems; i++) {
          const key = `assignee-${card.id}-${i}`;
          if (localStorage.getItem(key) === name) {
            localStorage.setItem(key, '미정');
            /* DOM 드롭다운도 즉시 반영 */
            const sel = document.querySelector(`.assignee-select[data-card="${card.id}"][data-idx="${i}"]`);
            if (sel) { sel.value = '미정'; sel.closest('.item-main')?.querySelector('.checklist-item')?.classList.remove('has-assignee'); }
          }
        }
      }
    }
  }

  AOPTS.splice(idx, 1);
  delete ASSIGNEE_COLOR_MAP[name];
  /* 기본 담당자는 hidden-assignees, 추가 담당자는 extra-assignees에서 제거 */
  const base = ['민주','찬희','대표님','미정'];
  if (base.includes(name)) {
    const hidden = JSON.parse(localStorage.getItem('hidden-assignees') || '[]');
    if (!hidden.includes(name)) { hidden.push(name); localStorage.setItem('hidden-assignees', JSON.stringify(hidden)); }
  } else {
    const extras = JSON.parse(localStorage.getItem('extra-assignees') || '[]');
    localStorage.setItem('extra-assignees', JSON.stringify(extras.filter(n => n !== name)));
  }
  /* DOM에서 카드 제거 */
  document.querySelector(`.assignee-card[data-assignee="${name}"]`)?.remove();
  /* 모든 드롭다운에서 옵션 제거 */
  document.querySelectorAll('.assignee-select, #modal-assignee-select, .pri-assignee-select, #atAssignee').forEach(sel => {
    const opt = [...sel.options].find(o => o.value === name);
    if (opt) sel.removeChild(opt);
  });
}

/* ─── 카드 메타데이터 조회 ─── */
function getCardMeta(cardId, idx) {
  for (const grade of GRADES) {
    for (const sem of grade.semesters) {
      for (const card of sem.cards) {
        if (card.id === cardId) {
          if (idx < card.items.length) {
            return {
              grade_id:   grade.id,
              grade_name: grade.name,
              semester:   sem.name,
              card_type:  card.type,
              card_title: card.title,
              item_label: card.items[idx]?.label || ''
            };
          }
          const extras = JSON.parse(localStorage.getItem('extra-items-' + cardId) || '[]');
          return {
            grade_id:   grade.id,
            grade_name: grade.name,
            semester:   sem.name,
            card_type:  card.type,
            card_title: card.title,
            item_label: extras[idx - card.items.length] || ''
          };
        }
      }
    }
  }
  return {};
}

/* ─── Supabase 데이터 → localStorage 반영 ─── */
function applyToLocalStorage(data) {
  const byCard = {};
  data.forEach(row => {
    if (!byCard[row.card_id]) byCard[row.card_id] = [];
    byCard[row.card_id][row.item_index] = row;
  });
  Object.entries(byCard).forEach(([cardId, items]) => {
    localStorage.setItem('card-' + cardId, JSON.stringify(items.map(it => it ? it.done : false)));
    items.forEach((it, idx) => {
      if (!it) return;
      localStorage.setItem(`assignee-${cardId}-${idx}`, it.assignee || '미정');
      it.deadline ? localStorage.setItem(`detail-${cardId}-${idx}-deadline`, it.deadline)
                  : localStorage.removeItem(`detail-${cardId}-${idx}-deadline`);
      it.memo     ? localStorage.setItem(`detail-${cardId}-${idx}-memo`, it.memo)
                  : localStorage.removeItem(`detail-${cardId}-${idx}-memo`);
      it.link     ? localStorage.setItem(`detail-${cardId}-${idx}-link`, it.link)
                  : localStorage.removeItem(`detail-${cardId}-${idx}-link`);
    });
  });
}

/* ─── 초기 데이터 시드 (테이블 비어있을 때) ─── */
async function seedSupabase() {
  const rows = [];
  GRADES.forEach(grade => {
    grade.semesters.forEach(sem => {
      sem.cards.forEach(card => {
        const saved = localStorage.getItem('card-' + card.id);
        const states = saved ? JSON.parse(saved) : card.items.map(i => i.done);
        card.items.forEach((item, idx) => {
          rows.push({
            card_id:    card.id,
            item_index: idx,
            grade_id:   grade.id,
            grade_name: grade.name,
            semester:   sem.name,
            card_type:  card.type,
            card_title: card.title,
            item_label: item.label,
            done:       states[idx] ?? item.done,
            assignee:   localStorage.getItem(`assignee-${card.id}-${idx}`) || '미정',
            deadline:   localStorage.getItem(`detail-${card.id}-${idx}-deadline`) || null,
            memo:       localStorage.getItem(`detail-${card.id}-${idx}-memo`)     || null,
            link:       localStorage.getItem(`detail-${card.id}-${idx}-link`)     || null,
            updated_at: new Date().toISOString()
          });
        });
      });
    });
  });
  const { error } = await _sb.from('item_states').upsert(rows, { onConflict: 'card_id,item_index' });
  if (error) throw error;
  console.log(`[Supabase] ${rows.length}개 항목 시드 완료`);
}

/* ─── Supabase: 전체 로드 ─── */
async function loadAllFromSupabase() {
  try {
    const { data, error } = await _sb.from('item_states').select('*');
    if (error) throw error;

    if (!data || data.length === 0) {
      // 테이블이 비어있으면 현재 상태로 시드
      await seedSupabase();
      const { data: seeded } = await _sb.from('item_states').select('*');
      if (seeded?.length) applyToLocalStorage(seeded);
      return true;
    }

    applyToLocalStorage(data);
    return true;
  } catch (e) {
    console.warn('[Supabase] 로드 실패 → localStorage 사용:', e.message);
    return false;
  }
}

/* ─── Supabase: 카드 전체 일괄 저장 ─── */
async function saveCardToSupabase(cardId) {
  if (_isInitializing) return;
  const items = [...document.querySelectorAll(`#cl-${cardId} .checklist-item`)];
  if (!items.length) return;
  const rows = items.map((item, idx) => ({
    card_id:    cardId,
    item_index: idx,
    ...getCardMeta(cardId, idx),
    done:       item.querySelector('input').checked,
    assignee:   localStorage.getItem(`assignee-${cardId}-${idx}`) || '미정',
    deadline:   localStorage.getItem(`detail-${cardId}-${idx}-deadline`) || null,
    memo:       localStorage.getItem(`detail-${cardId}-${idx}-memo`)     || null,
    link:       localStorage.getItem(`detail-${cardId}-${idx}-link`)     || null,
    updated_at: new Date().toISOString()
  }));
  try {
    const { error } = await _sb.from('item_states').upsert(rows, { onConflict: 'card_id,item_index' });
    if (error) throw error;
  } catch (e) {
    console.warn('[Supabase] 카드 저장 실패:', e.message);
  }
}

/* ─── Supabase: 단일 항목 저장 ─── */
async function saveItemToSupabase(cardId, idx) {
  if (_isInitializing) return;
  const clItem = document.querySelectorAll(`#cl-${cardId} .checklist-item`)[idx];
  if (!clItem) return;
  try {
    const { error } = await _sb.from('item_states').upsert({
      card_id:    cardId,
      item_index: idx,
      ...getCardMeta(cardId, idx),
      done:       clItem.querySelector('input').checked,
      assignee:   localStorage.getItem(`assignee-${cardId}-${idx}`) || '미정',
      deadline:   localStorage.getItem(`detail-${cardId}-${idx}-deadline`) || null,
      memo:       localStorage.getItem(`detail-${cardId}-${idx}-memo`)     || null,
      link:       localStorage.getItem(`detail-${cardId}-${idx}-link`)     || null,
      updated_at: new Date().toISOString()
    }, { onConflict: 'card_id,item_index' });
    if (error) throw error;
  } catch (e) {
    console.warn('[Supabase] 항목 저장 실패:', e.message);
  }
}
