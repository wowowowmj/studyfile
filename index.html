      <input type="checkbox"${done ? ' checked' : ''}/>
      <button class="status-btn" type="button" data-card="${cardId}" data-idx="${i}" data-status="${status||''}">${status||''}</button>
      <div class="item-col">
        <span class="check-label">${label}</span>
        <span class="deadline-display">${deadline ? fmtMD(deadline) : '기한입력'}</span>
        <input type="date" class="deadline-input" data-card="${cardId}" data-idx="${i}" value="${deadline}" title="마감기한 설정"/>
      </div>
    </label>
    <select class="assignee-select" data-card="${cardId}" data-idx="${i}">${opts}</select>
    <button class="item-expand-btn" type="button" title="메모">···</button>
    ${canDelete ? `<button class="item-delete-btn" type="button" title="삭제">×</button>` : ''}
  </div>
  <div class="item-memo-row">
    <textarea class="item-memo" placeholder="메모를 입력하세요..."></textarea>
    <button class="item-memo-delete" type="button">메모 삭제</button>
  </div>
</div>`;
}

/* ─── 카드 상태배지 스테이징 ─── */
const pendingCardChanges = new Map(); // "cardId__idx" → { newStatus, originalStatus }

function updateCardFooter(cardId) {
  const hasPending = [...pendingCardChanges.keys()].some(k => k.startsWith(cardId + '__'));
  document.getElementById(`cpf-${cardId}`)?.classList.toggle('visible', hasPending);
}

function applyCardChanges(cardId) {
  let hasDeadline = false, hasAssignee = false;
  pendingCardChanges.forEach((val, key) => {
    if (!key.startsWith(cardId + '__')) return;
    const parts = key.split('__');
    const idx = +parts[1];
    const type = parts[2];
    if (type === 'dl') {
      if (val.newValue) localStorage.setItem(`detail-${cardId}-${idx}-deadline`, val.newValue);
      else              localStorage.removeItem(`detail-${cardId}-${idx}-deadline`);
      saveItemToSupabase(cardId, idx);
      hasDeadline = true;
    } else if (type === 'as') {
      if (val.newValue) localStorage.setItem(`assignee-${cardId}-${idx}`, val.newValue);
      else              localStorage.removeItem(`assignee-${cardId}-${idx}`);
      saveItemToSupabase(cardId, idx);
      hasAssignee = true;
    } else {
      const { newStatus } = val;
      if (newStatus) localStorage.setItem(`detail-${cardId}-${idx}-status`, newStatus);
      else           localStorage.removeItem(`detail-${cardId}-${idx}-status`);
      const itemEl = document.querySelectorAll(`#cl-${cardId} .checklist-item`)[idx];
      if (itemEl) itemEl.querySelector('input').checked = (newStatus === '완료');
      saveItemToSupabase(cardId, idx);
    }
  });
  [...pendingCardChanges.keys()].filter(k => k.startsWith(cardId + '__'))
    .forEach(k => pendingCardChanges.delete(k));
  const info = getCardObject(cardId);
  if (info) updateCard(cardId, info.grade.id);
  document.dispatchEvent(new CustomEvent('status-updated'));
  if (hasDeadline) document.dispatchEvent(new CustomEvent('deadline-updated'));
  if (hasAssignee) document.dispatchEvent(new CustomEvent('assignee-updated'));
}

function cancelCardChanges(cardId) {
  document.querySelectorAll(`#cl-${cardId} .checklist-item`).forEach((itemEl, idx) => {
    const statusKey = `${cardId}__${idx}`;
    const dlKey     = `${cardId}__${idx}__dl`;
    const asKey     = `${cardId}__${idx}__as`;
    if (pendingCardChanges.has(statusKey)) {
      const orig = pendingCardChanges.get(statusKey).originalStatus;
      const btn = itemEl.querySelector('.status-btn');
      if (btn) { btn.dataset.status = orig; btn.textContent = orig; }
    }
    if (pendingCardChanges.has(dlKey)) {
      const orig = pendingCardChanges.get(dlKey).originalValue;
      const inp  = itemEl.querySelector('.deadline-input');
      const disp = itemEl.querySelector('.deadline-display');
      if (inp)  inp.value = orig || '';
      if (disp) disp.textContent = orig ? fmtMD(orig) : '기한입력';
      itemEl.classList.toggle('has-deadline', !!orig);
    }
    if (pendingCardChanges.has(asKey)) {
      const orig = pendingCardChanges.get(asKey).originalValue;
      const sel  = itemEl.parentElement?.querySelector('.assignee-select');
      if (sel) sel.value = orig || '';
      itemEl.classList.toggle('has-assignee', !!orig && orig !== '미정');
    }
    if (pendingCardChanges.has(statusKey) || pendingCardChanges.has(dlKey) || pendingCardChanges.has(asKey)) {
      itemEl.closest('.item-wrap')?.classList.remove('card-item-pending');
    }
  });
  [...pendingCardChanges.keys()].filter(k => k.startsWith(cardId + '__'))
    .forEach(k => pendingCardChanges.delete(k));
  updateCardFooter(cardId);
}

/* ─── 카드 DOM 생성 ─── */
function buildCard(card, gradeColor, unitColor, vodColor, gradeId, gradeName, semName) {
  const color    = card.type === 'study' ? gradeColor : card.type === 'vod' ? vodColor : unitColor;
  const typeName = `${gradeName} ${semName}`;

  /* 마이그레이션 여부: 한 번이라도 항목을 삭제하면 모든 항목이 extra-items로 통합 */
  const isMigrated     = localStorage.getItem('card-migrated-' + card.id) === '1';
  const effectiveBase  = isMigrated ? [] : card.items;
  const effectiveBaseCount = effectiveBase.length;

  const saved  = localStorage.getItem('card-' + card.id);
  const states = saved ? JSON.parse(saved) : effectiveBase.map(i => i.done);

  const baseHTML = effectiveBase.map((item, i) => {
    const done     = !!states[i];
    const status   = localStorage.getItem(`detail-${card.id}-${i}-status`) || (done ? '완료' : '');
    const assignee = localStorage.getItem(`assignee-${card.id}-${i}`) || '미정';
    const deadline = localStorage.getItem(`detail-${card.id}-${i}-deadline`) || '';
    return buildItemHTML(card.id, i, item.label, status, assignee, deadline, true);
  }).join('');

  const extraLabels = JSON.parse(localStorage.getItem('extra-items-' + card.id) || '[]');
  const extraHTML = extraLabels.map((label, ei) => {
    const i        = effectiveBaseCount + ei;
    const done     = !!states[i];
    const status   = localStorage.getItem(`detail-${card.id}-${i}-status`) || (done ? '완료' : '');
    const assignee = localStorage.getItem(`assignee-${card.id}-${i}`) || '미정';
    const deadline = localStorage.getItem(`detail-${card.id}-${i}-deadline`) || '';
    return buildItemHTML(card.id, i, label, status, assignee, deadline, true);
  }).join('');

  const totalCount = effectiveBaseCount + extraLabels.length;

  const el = document.createElement('div');
  el.className = 'card';
  el.id = 'card-' + card.id;
  el.innerHTML = `
    <div class="card-top">
      <div class="circle-wrap">
        <svg viewBox="0 0 88 88">
          <circle class="circle-bg" cx="44" cy="44" r="36"/>
          <circle class="circle-prog" id="prog-${card.id}" cx="44" cy="44" r="36"
            stroke-dasharray="${CIRC}" stroke-dashoffset="${CIRC}" stroke="${color}"/>
        </svg>
        <div class="circle-pct-text">
          <span class="num" id="num-${card.id}">0</span>
          <span class="unit">%</span>
        </div>
      </div>
      <div class="card-info">
        <span class="card-type-badge" style="background:${color}">${typeName}</span>
        <div class="card-title-row">
          <div class="card-title">${card.title}</div>
          <div class="detail-toggle-wrap">
            <button class="detail-toggle-btn" type="button">세부내용 보기</button>
          </div>
        </div>
        <div class="card-count"><span class="done-num" id="cnt-${card.id}">0</span> / <span id="total-${card.id}">${totalCount}</span> 완료</div>
      </div>
    </div>
    <div class="checklist" id="cl-${card.id}">${baseHTML}${extraHTML}</div>
    <div class="add-item-row">
      <button class="sort-toggle-btn" type="button">↕ 순서 변경</button>
      <button class="add-item-btn" data-card="${card.id}" type="button">+ 업무 추가</button>
    </div>
    <div class="add-item-input-row" id="add-row-${card.id}">
      <input class="add-item-input" type="text" placeholder="업무 이름 입력..." maxlength="40"/>
      <button class="add-item-confirm" data-card="${card.id}" type="button">추가</button>
      <button class="add-item-cancel" data-card="${card.id}" type="button">취소</button>
    </div>
    <div class="complete-badge">${doneSVG} 모든 준비가 완료되었습니다!</div>
    <div class="card-pending-footer" id="cpf-${card.id}">
      <button class="cpf-cancel" type="button">취소</button>
      <button class="cpf-apply" type="button">✓ 반영</button>
    </div>`;

  /* 기존 이벤트 연결 헬퍼 */
  function bindItem(itemEl, idx, canDelete) {
    const statusBtn = itemEl.querySelector('.status-btn');
    const cbInput   = itemEl.querySelector('input[type="checkbox"]');
    if (statusBtn) {
      statusBtn.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        const key            = `${card.id}__${idx}`;
        const currentShown   = statusBtn.dataset.status || '';
        const next           = STATUS_CYCLE[(STATUS_CYCLE.indexOf(currentShown) + 1) % STATUS_CYCLE.length];
        const originalStatus = pendingCardChanges.has(key)
          ? pendingCardChanges.get(key).originalStatus
          : (localStorage.getItem(`detail-${card.id}-${idx}-status`) || '');
        statusBtn.dataset.status = next;
        statusBtn.textContent    = next;
        if (next !== originalStatus) {
          pendingCardChanges.set(key, { newStatus: next, originalStatus });
          itemEl.closest('.item-wrap')?.classList.add('card-item-pending');
        } else {
          pendingCardChanges.delete(key);
          itemEl.closest('.item-wrap')?.classList.remove('card-item-pending');
        }
        updateCardFooter(card.id);
      });
    }
    const itemMain = itemEl.parentElement; // .item-main
    const sel = itemMain.querySelector('.assignee-select');
    sel.addEventListener('change', () => {
      const val = sel.value;
      const asKey = `${card.id}__${idx}__as`;
      const rawOrig = localStorage.getItem(`assignee-${card.id}-${idx}`);
      if (rawOrig === null && !pendingCardChanges.has(asKey)) {
        if (val) localStorage.setItem(`assignee-${card.id}-${idx}`, val);
        else     localStorage.removeItem(`assignee-${card.id}-${idx}`);
        itemEl.classList.toggle('has-assignee', val !== '' && val !== '미정');
        saveItemToSupabase(card.id, idx);
        document.dispatchEvent(new CustomEvent('assignee-updated'));
        return;
      }
      const originalValue = pendingCardChanges.has(asKey)
        ? pendingCardChanges.get(asKey).originalValue
        : (rawOrig || '');
      itemEl.classList.toggle('has-assignee', val !== '' && val !== '미정');
      if (val !== originalValue) {
        pendingCardChanges.set(asKey, { newValue: val, originalValue });
        itemEl.closest('.item-wrap')?.classList.add('card-item-pending');
      } else {
        pendingCardChanges.delete(asKey);
        itemEl.closest('.item-wrap')?.classList.remove('card-item-pending');
      }
      updateCardFooter(card.id);
    });
    const inp = itemEl.querySelector('.deadline-input');
    inp.addEventListener('click', e => e.stopPropagation());
    inp.addEventListener('change', () => {
      const val = inp.value;
      const dlKey = `${card.id}__${idx}__dl`;
      const rawOrig = localStorage.getItem(`detail-${card.id}-${idx}-deadline`);
      const disp2 = itemEl.querySelector('.deadline-display');
      if (rawOrig === null && !pendingCardChanges.has(dlKey)) {
        if (val) localStorage.setItem(`detail-${card.id}-${idx}-deadline`, val);
        else     localStorage.removeItem(`detail-${card.id}-${idx}-deadline`);
        itemEl.classList.toggle('has-deadline', !!val);
        if (disp2) disp2.textContent = val ? fmtMD(val) : '기한입력';
        saveItemToSupabase(card.id, idx);
        document.dispatchEvent(new CustomEvent('deadline-updated'));
        return;
      }
      const originalValue = pendingCardChanges.has(dlKey)
        ? pendingCardChanges.get(dlKey).originalValue
        : (rawOrig || '');
      itemEl.classList.toggle('has-deadline', !!val);
      if (disp2) disp2.textContent = val ? fmtMD(val) : '기한입력';
      if (val !== originalValue) {
        pendingCardChanges.set(dlKey, { newValue: val, originalValue });
        itemEl.closest('.item-wrap')?.classList.add('card-item-pending');
      } else {
        pendingCardChanges.delete(dlKey);
        itemEl.closest('.item-wrap')?.classList.remove('card-item-pending');
      }
      updateCardFooter(card.id);
    });
    const disp = itemEl.querySelector('.deadline-display');
    if (disp) disp.addEventListener('click', e => {
      e.stopPropagation();
      try { inp.showPicker(); } catch(x) { inp.click(); }
    });
    /* 메모 토글 */
    const memoRow   = itemEl.closest('.item-wrap').querySelector('.item-memo-row');
    const memoTA    = memoRow?.querySelector('.item-memo');
    const expandBtn = itemMain.querySelector('.item-expand-btn');
    if (memoTA) {
      const savedMemo = localStorage.getItem(`detail-${card.id}-${idx}-memo`) || '';
      memoTA.value = savedMemo;
      if (savedMemo) {
        expandBtn?.classList.add('has-memo');
        if (expandBtn) expandBtn.dataset.memo = savedMemo;
      }
      memoTA.addEventListener('input', () => {
        const v = memoTA.value;
        if (v) localStorage.setItem(`detail-${card.id}-${idx}-memo`, v);
        else   localStorage.removeItem(`detail-${card.id}-${idx}-memo`);
        expandBtn?.classList.toggle('has-memo', !!v);
        if (expandBtn) expandBtn.dataset.memo = v;
      });
      memoTA.addEventListener('blur', function() {
        setTimeout(function() {
          const ae = document.activeElement;
          if (ae && (itemEl.contains(ae) || (memoRow && memoRow.contains(ae)))) return;
          if (memoRow) memoRow.classList.remove('open');
          itemMain.classList.remove('memo-open');
        }, 150);
      });
    }
    expandBtn?.addEventListener('click', e => {
      e.preventDefault(); e.stopPropagation();
      /* 다른 열린 메모 모두 닫기 */
      document.querySelectorAll('.item-memo-row.open').forEach(r => {
        if (r !== memoRow) { r.classList.remove('open'); r.previousElementSibling?.classList.remove('memo-open'); }
      });
      const isOpen = memoRow?.classList.toggle('open');
      itemMain.classList.toggle('memo-open', !!isOpen);
      if (isOpen && memoTA) memoTA.focus();
    });
    if (canDelete) {
      const doDelete = e => {
        e.preventDefault(); e.stopPropagation();
        if (!confirm('이 항목을 삭제할까요?')) return;
        deleteItem(card.id, idx, effectiveBaseCount);
      };
      itemMain.querySelector('.item-delete-btn')?.addEventListener('click', doDelete);
      memoRow?.querySelector('.item-memo-delete')?.addEventListener('click', e => {
        e.preventDefault(); e.stopPropagation();
        if (!memoTA) return;
        memoTA.value = '';
        localStorage.removeItem(`detail-${card.id}-${idx}-memo`);
        expandBtn?.classList.remove('has-memo');
        if (expandBtn) expandBtn.dataset.memo = '';
        memoRow.classList.remove('open');
        itemMain.classList.remove('memo-open');
      });
    }
  }

  el.querySelectorAll(`#cl-${card.id} .checklist-item`).forEach((itemEl, i) => bindItem(itemEl, i, true));

  // 리빌드 후 pending 상태 복원
  el.querySelectorAll(`#cl-${card.id} .checklist-item`).forEach((itemEl, idx) => {
    const key = `${card.id}__${idx}`;
    if (pendingCardChanges.has(key)) {
      const { newStatus } = pendingCardChanges.get(key);
      const btn = itemEl.querySelector('.status-btn');
      if (btn) { btn.dataset.status = newStatus; btn.textContent = newStatus; }
      itemEl.closest('.item-wrap')?.classList.add('card-item-pending');
    }
  });
  el.querySelector('.cpf-cancel')?.addEventListener('click', () => cancelCardChanges(card.id));
  el.querySelector('.cpf-apply')?.addEventListener('click', () => applyCardChanges(card.id));
  document.addEventListener('pointerdown', function onPendingOutside(e) {
    const footer = document.getElementById(`cpf-${card.id}`);
    if (!footer?.classList.contains('visible')) return;
    if (el.contains(e.target)) return;
    if (confirm('변경사항을 반영하시겠습니까?')) applyCardChanges(card.id);
    else cancelCardChanges(card.id);
  });
  el.querySelector('.detail-toggle-btn')?.addEventListener('click', () => {
    const open = el.classList.toggle('show-detail');
    el.querySelector('.detail-toggle-btn').textContent = open ? '세부내용 닫기' : '세부내용 보기';
  });
  updateCardFooter(card.id);

  /* ─ 순서 변경 (drag-to-reorder) ─ */
  (function() {
    const sortBtn = el.querySelector('.sort-toggle-btn');
    const clList  = el.querySelector(`#cl-${card.id}`);
    if (!sortBtn || !clList) return;
    let dragSrc = null, touchItem = null;

    let savedSortOrder = null;
    function exitSortMode(save) {
      if (!el.classList.contains('sort-mode')) return;
      el.classList.remove('sort-mode');
      sortBtn.textContent = '↕ 순서 변경';
      clList.querySelectorAll('.item-wrap').forEach(w => { w.draggable = false; });
      if (save) {
        const newOrder = [...clList.querySelectorAll('.item-wrap')].map(w =>
          parseInt(w.querySelector('.assignee-select')?.dataset.idx ?? 0)
        );
        applyReorder(card.id, newOrder);
      } else if (savedSortOrder) {
        savedSortOrder.forEach(w => clList.appendChild(w));
      }
      savedSortOrder = null;
    }
    sortBtn.addEventListener('click', () => {
      if (el.classList.contains('sort-mode')) { exitSortMode(true); return; }
      savedSortOrder = [...clList.querySelectorAll('.item-wrap')];
      el.classList.add('sort-mode');
      sortBtn.textContent = '✓ 완료';
      clList.querySelectorAll('.item-wrap').forEach(w => { w.draggable = true; });
    });
    document.addEventListener('pointerdown', function onSortOutside(e) {
      if (!el.classList.contains('sort-mode')) return;
      if (!el.contains(e.target)) exitSortMode(false);
    });

    /* ── HTML5 drag (desktop) ── */
    clList.addEventListener('dragstart', e => {
      const wrap = e.target.closest('.item-wrap');
      if (!wrap) return;
      dragSrc = wrap;
      setTimeout(() => wrap.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    clList.addEventListener('dragover', e => {
      if (!dragSrc) return;
      e.preventDefault();
      const wrap = e.target.closest('.item-wrap');
      if (!wrap || wrap === dragSrc) return;
      const r = wrap.getBoundingClientRect();
      clList.insertBefore(dragSrc, e.clientY < r.top + r.height / 2 ? wrap : wrap.nextSibling);
    });
    clList.addEventListener('dragend', () => { dragSrc?.classList.remove('dragging'); dragSrc = null; });

    /* ── Touch drag (mobile) ── */
    clList.addEventListener('touchstart', e => {
      if (!el.classList.contains('sort-mode')) return;
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      touchItem = handle.closest('.item-wrap');
      touchItem?.classList.add('dragging');
    }, { passive: true });
    clList.addEventListener('touchmove', e => {
      if (!touchItem) return;
      e.preventDefault();
      const t = e.touches[0];
      touchItem.hidden = true;
      const target = document.elementFromPoint(t.clientX, t.clientY)?.closest('.item-wrap');
      touchItem.hidden = false;
      if (target && target !== touchItem && target.parentNode === clList) {
        const r = target.getBoundingClientRect();
        clList.insertBefore(touchItem, t.clientY < r.top + r.height / 2 ? target : target.nextSibling);
      }
    }, { passive: false });
    clList.addEventListener('touchend', () => { touchItem?.classList.remove('dragging'); touchItem = null; });
  })();

  /* 업무 추가 버튼 */
  const addRow = el.querySelector(`#add-row-${card.id}`);
  const addInput = el.querySelector('.add-item-input');
  function cancelAddItem() {
    addRow.classList.remove('active');
    addInput.value = '';
  }
  el.querySelector('.add-item-btn').addEventListener('click', () => {
    if (addRow.classList.contains('active')) { cancelAddItem(); return; }
    addRow.classList.add('active');
    addInput.focus();
  });
  el.querySelector('.add-item-cancel').addEventListener('click', cancelAddItem);
  document.addEventListener('pointerdown', function onOutside(e) {
    if (!addRow.classList.contains('active')) return;
    if (!el.contains(e.target)) cancelAddItem();
  });
  el.querySelector('.add-item-confirm').addEventListener('click', () => {
    const inputEl = el.querySelector('.add-item-input');
    const label = inputEl.value.trim();
    if (!label) return;

    const extras = JSON.parse(localStorage.getItem('extra-items-' + card.id) || '[]');
    extras.push(label);
    localStorage.setItem('extra-items-' + card.id, JSON.stringify(extras));

    const idx = effectiveBaseCount + extras.length - 1;
    const newHTML = buildItemHTML(card.id, idx, label, '', '미정', '', true);
    const checklist = el.querySelector(`#cl-${card.id}`);
    const tmp = document.createElement('div');
    tmp.innerHTML = newHTML;
    while (tmp.firstChild) checklist.appendChild(tmp.firstChild);
    const newItem = checklist.querySelectorAll('.checklist-item')[idx];
    bindItem(newItem, idx, true);

    const states2 = JSON.parse(localStorage.getItem('card-' + card.id) || '[]');
    states2[idx] = false;
    localStorage.setItem('card-' + card.id, JSON.stringify(states2));
    saveItemToSupabase(card.id, idx);
    updateCard(card.id, gradeId);

    inputEl.value = '';
    el.querySelector(`#add-row-${card.id}`).classList.remove('active');
    document.dispatchEvent(new CustomEvent('assignee-updated'));
  });
  el.querySelector('.add-item-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') el.querySelector('.add-item-confirm').click();
    if (e.key === 'Escape') el.querySelector('.add-item-cancel').click();
  });

  return el;
}

/* ─── UI 전체 생성 ─── */
function buildUI() {
  const main = document.getElementById('main');
  const gradeTitle = document.createElement('div');
  gradeTitle.className = 'type-title';
  gradeTitle.style.paddingTop = '20px';
  gradeTitle.textContent = '📖 학년별 자료 현황';
  main.appendChild(gradeTitle);
  GRADES.forEach(grade => {
    const sec = document.createElement('section');
    sec.className = 'grade-section';
    sec.style.setProperty('--grade-color', grade.color);
    sec.innerHTML = `
      <div class="grade-header">
        <div class="grade-badge">${grade.name[0]}</div>
        <h2>${grade.name}</h2>
        <div class="grade-mini-bar"><div class="grade-mini-fill" id="gfill-${grade.id}" style="width:0%"></div></div>
        <span class="grade-mini-pct" id="gpct-${grade.id}">0%</span>
        <button class="grade-toggle" type="button" aria-label="접기/펼치기"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 8,11 13,5"/></svg></button>
      </div>`;
    sec.classList.add('collapsed');
    sec.querySelector('.grade-toggle').addEventListener('click', () => {
      const isCollapsed = sec.classList.contains('collapsed');
      if (isCollapsed && !isMobView()) {
        // 학년별 섹션 펼칠 때: 자료유형별 카드 닫고 카드 복원
        _restoreCardsFromTypeView();
        document.querySelectorAll('.type-card').forEach(tc => tc.classList.remove('type-open'));
      }
      sec.classList.toggle('collapsed');
    });

    const semGrid = document.createElement('div');
    semGrid.className = 'semesters-grid';
    grade.semesters.forEach(sem => {
      const block = document.createElement('div');
      block.className = 'semester-block';
      block.innerHTML = `<div class="semester-label">${sem.name}</div>`;

      const stack = document.createElement('div');
      stack.className = 'semester-cards';
      stack.dataset.semKey = grade.id + 's' + sem.name.charAt(0);
      sem.cards.forEach(card => stack.appendChild(buildCard(card, grade.color, grade.unitColor, grade.vodColor || grade.unitColor, grade.id, grade.name, sem.name)));
      block.appendChild(stack);
      semGrid.appendChild(block);
    });
    sec.appendChild(semGrid);

    main.appendChild(sec);
  });

  /* 기타 섹션 */
  const etcSec = document.createElement('section');
  etcSec.id = 'grade-section-etc';
  etcSec.className = 'grade-section collapsed';
  etcSec.style.setProperty('--grade-color', '#64748b');
  etcSec.innerHTML = `
    <div class="grade-header">
      <div class="grade-badge">기</div>
      <h2>기타</h2>
      <button class="grade-toggle" type="button" aria-label="접기/펼치기"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 8,11 13,5"/></svg></button>
    </div>`;
  etcSec.querySelector('.grade-toggle').addEventListener('click', () => etcSec.classList.toggle('collapsed'));
  const etcGrid = document.createElement('div');
  etcGrid.className = 'semesters-grid';
  const etcStack = document.createElement('div');
  etcStack.className = 'semester-cards';
  etcStack.dataset.semKey = 'etc';
  etcGrid.appendChild(etcStack);
  etcSec.appendChild(etcGrid);
  main.appendChild(etcSec);
}

/* ─── 카드 업데이트 ─── */
function updateCard(cardId, gradeId) {
  const items = document.querySelectorAll(`#cl-${cardId} .checklist-item`);
  let done = 0;
  items.forEach(item => {
    const checked = item.querySelector('input').checked;
    item.classList.toggle('checked', checked);
    if (checked) done++;
  });

  const pct = items.length ? Math.round(done / items.length * 100) : 0;
  const prog = document.getElementById('prog-' + cardId);
  prog.style.strokeDashoffset = CIRC * (1 - pct / 100);
  prog.style.stroke = progressColor(pct);
  document.getElementById('num-' + cardId).textContent = pct;
  document.getElementById('cnt-' + cardId).textContent = done;
  const totalEl = document.getElementById('total-' + cardId);
  if (totalEl) totalEl.textContent = items.length;
  document.getElementById('card-' + cardId).classList.toggle('all-done', pct === 100);

  localStorage.setItem('card-' + cardId, JSON.stringify([...items].map(i => i.querySelector('input').checked)));
  saveCardToSupabase(cardId);
  updateGrade(gradeId);
  updateOverall();
}

/* ─── 학년 완료율 업데이트 ─── */
function updateGrade(gradeId) {
  const grade = GRADES.find(g => g.id === gradeId);
  if (!grade) return;
  let total = 0, done = 0;
  grade.semesters.forEach(sem => sem.cards.forEach(card => {
    document.querySelectorAll(`#cl-${card.id} .checklist-item`).forEach(item => {
      total++;
      if (item.querySelector('input').checked) done++;
    });
  }));
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('gfill-' + gradeId).style.width = pct + '%';
  document.getElementById('gpct-'  + gradeId).textContent = pct + '%';
}

/* ─── 전체 완료율 업데이트 ─── */
function updateOverall() {
  const all  = document.querySelectorAll('.checklist-item');
  let done = 0;
  all.forEach(item => { if (item.querySelector('input').checked) done++; });
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('overallFill').style.width = pct + '%';
  document.getElementById('overallPct').textContent  = pct + '%';
}

/* ─── 초기화 ─── */
(async function init() {
  const overlay = document.getElementById('loading-overlay');

  // 어떤 상황에서도 오버레이 반드시 제거
  function hideOverlay() {
    if (overlay) overlay.style.display = 'none';
  }

  try {
    // 버전 변경 시 localStorage 초기화
    if (localStorage.getItem('_dv') !== DATA_VERSION) {
      Object.keys(localStorage)
        .filter(k => k.startsWith('card-') || k.startsWith('assignee-') || k.startsWith('detail-'))
        .forEach(k => localStorage.removeItem(k));
      localStorage.setItem('_dv', DATA_VERSION);
    }

    // Supabase에서 최신 데이터 로드 (실패해도 계속 진행)
    await loadAllFromSupabase();
  } catch (e) {
    console.warn('[init] 초기화 중 오류, localStorage로 진행:', e.message);
  } finally {
    // UI 구성 (localStorage 기반)
    buildUI();

    GRADES.forEach(grade =>
      grade.semesters.forEach(sem =>
        sem.cards.forEach(card => updateCard(card.id, grade.id))
      )
    );

    _isInitializing = false;
    /* 모달 select에 extra 담당자 동기화 */
    const modalSel = document.getElementById('modal-assignee-select');
    if (modalSel) {
      AOPTS.forEach(name => {
        if (![...modalSel.options].some(o => o.value === name)) {
          const opt = document.createElement('option');
          opt.value = name; opt.textContent = name;
          modalSel.appendChild(opt);
        }
      });
    }
    hideOverlay();
    // 카드 DOM이 완성된 뒤 보조 섹션(로드맵·담당자·유형) 재렌더링
    document.dispatchEvent(new CustomEvent('dashboard-ready'));
  }
})();

/* ─── 자료준비 로드맵 v2 ─── */
(function () {
  /* 구간 정의 */
  const SEGS = [
    { id: 's1', label: '26.06~08',    cards: ['g4s2-study', 'g5s1-study', 'g5s1-vod'] },
    { id: 's2', label: '26.07~11',    cards: ['g3s2-study', 'g3s2-unit'] },
    { id: 's3', label: '26.09~11',    cards: ['g4s2-unit',  'g5s2-study', 'g5s2-vod'] },
    { id: 's4', label: '26.12~27.02', cards: ['g5s1-unit',  'g6s1-study', 'g6s1-vod'] },
    { id: 's5', label: '27.03~05',    cards: ['g5s1-unit',  'g6s2-study', 'g6s2-vod'] },
    { id: 's6', label: '27.09~11',    cards: ['g5s2-unit'] },
  ];

  /* 카드 ID → 표시명 매핑 */
  const CINFO = {};
  GRADES.forEach(g => g.semesters.forEach(s => s.cards.forEach(c => {
    CINFO[c.id] = { name: `${g.name} ${s.name} ${c.title}`, shortName: `${g.name} ${s.name}`, color: g.color };
  })));

  /* 카드의 체크리스트 아이템 배열 */
  const clItems = id => [...document.querySelectorAll(`#cl-${id} .checklist-item`)];

  /* 구간 통계 */
  function segStat(seg) {
    let total = 0, done = 0;
    seg.cards.forEach(id => clItems(id).forEach(it => {
      total++;
      if (it.querySelector('input').checked) done++;
    }));
    return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
  }

  /* ── 타임라인 띠 구축 ── */
  function buildBand() {
    const band = document.getElementById('roadmapBand');
    if (!band) return;
    band.innerHTML = '';
    SEGS.forEach(seg => {
      const st = segStat(seg);
      if (st.pct === 100) return; /* 완료 구간 숨김 */
      const cls = st.pct >= 50 ? 'seg-yellow' : 'seg-red';

      /* 툴팁 카드 목록 */
      const ttRows = seg.cards.map(id => {
        const its = clItems(id);
        const d = its.filter(i => i.querySelector('input').checked).length;
        const info = CINFO[id] || { name: id, color: '#94A7E8' };
        return `<div class="rm-tt-row">
          <span class="rm-tt-dot ${d === its.length ? 'done' : 'todo'}"></span>
          <span>${info.name} (${d}/${its.length})</span>
        </div>`;
      }).join('');

      const cell = document.createElement('div');
      cell.className = `rm-seg ${cls}`;
      cell.id = 'rmseg-' + seg.id;
      cell.innerHTML = `
        <div class="rm-seg-period">${seg.label}</div>
        <div class="rm-seg-pct">${st.pct}<span style="font-size:.6rem;font-weight:600">%</span></div>
        <div class="rm-bar-track"><div class="rm-bar-fill" style="width:${st.pct}%"></div></div>
        <div class="rm-seg-count">${st.done}/${st.total} 완료</div>
        <div class="rm-tooltip">
          <div class="rm-tt-title">📂 ${seg.label} 자료목록</div>
          ${ttRows}
        </div>`;
      band.appendChild(cell);
    });
  }

  /* ── 우선작업 체크리스트 구축 (스테이징 방식) ── */
  function priDateDisplay(dl) {
    if (!dl) return { text: '날짜', cls: 'empty' };
    const t = new Date().toISOString().slice(0, 10);
    const [, m, d] = dl.split('-');
    const diff = Math.ceil((new Date(dl) - new Date(t)) / 86400000);
    return { text: `${+m}/${+d}`, cls: diff < 0 ? 'overdue' : diff <= 14 ? 'soon' : 'ok' };
  }

  const pendingChanges     = new Map(); // "cardId__idx" → { newStatus, originalStatus }
  const pendingMetaChanges = new Map(); // "cardId__idx" → { dateNew, dateOld, assigneeNew, assigneeOld }

  let _priOutside = null;
  function setupPriOutside() {
    if (_priOutside) return;
    _priOutside = function(e) {
      if (pendingChanges.size === 0 && pendingMetaChanges.size === 0) { teardownPriOutside(); return; }
      const footer = document.getElementById('priFooter');
      if (footer && footer.contains(e.target)) return;
      const allKeys = new Set([...pendingChanges.keys(), ...pendingMetaChanges.keys()]);
      const inside = [...allKeys].some(key => {
        const [c, i] = key.split('__');
        const el = document.querySelector(`#priList .pri-item[data-card="${c}"][data-idx="${i}"]`);
        return el && el.contains(e.target);
      });
      if (inside) return;
      e.stopPropagation();
      teardownPriOutside();
      setTimeout(() => {
        const ok = confirm('변경사항을 반영할까요?');
        if (ok) document.getElementById('priApplyBtn')?.click();
        else    document.getElementById('priCancelBtn')?.click();
      }, 0);
    };
    document.addEventListener('mousedown', _priOutside, true);
  }
  function teardownPriOutside() {
    if (_priOutside) { document.removeEventListener('mousedown', _priOutside, true); _priOutside = null; }
  }

  function updatePriFooter() {
    const footer = document.getElementById('priFooter');
    if (footer) footer.classList.toggle('visible', pendingChanges.size > 0 || pendingMetaChanges.size > 0);
  }

  function buildPriority() {
    const list  = document.getElementById('priList');
    const badge = document.getElementById('priBadge');
    if (!list) return;

    const seen = new Set();
    const items = [];
    SEGS.forEach(seg => {
      seg.cards.forEach(cardId => {
        clItems(cardId).forEach((it, idx) => {
          const key = `${cardId}__${idx}`;
          const status = it.querySelector('.status-btn')?.dataset.status ?? '';
          if (status !== '완료' && !seen.has(key)) {
            seen.add(key);
            const info = CINFO[cardId] || { name: cardId, color: '#94A7E8' };
            const assignee = localStorage.getItem(`assignee-${cardId}-${idx}`) || '';
            const deadline = localStorage.getItem(`detail-${cardId}-${idx}-deadline`) || '';
            const memo     = localStorage.getItem(`detail-${cardId}-${idx}-memo`) || '';
            items.push({ cardId, idx, period: seg.label, cardName: info.shortName || info.name, color: info.color,
              itemLabel: it.querySelector('.check-label').textContent, assignee, deadline, memo, status });
          }
        });
      });
    });

    items.sort((a, b) => {
      if (a.deadline && b.deadline) return a.deadline.localeCompare(b.deadline);
      if (a.deadline) return -1; if (b.deadline) return 1; return 0;
    });

    if (badge) badge.textContent = items.length;

    if (items.length === 0) {
      list.innerHTML = '<div class="pri-empty">🎉 모든 우선 자료가<br>완료되었습니다!</div>';
      return;
    }

    const today = new Date().toISOString().slice(0, 10);
    function deadlineBadge(dl) {
      if (!dl) return '';
      const [, m, d] = dl.split('-');
      const label = `${+m}/${+d}`;
      const diff = Math.ceil((new Date(dl) - new Date(today)) / 86400000);
      const cls = diff < 0 ? '' : diff <= 14 ? 'soon' : 'ok';
      const prefix = diff < 0 ? '⚠️ ' : diff === 0 ? '🔴 오늘 ' : diff <= 14 ? '🟡 ' : '📅 ';
      return `<span class="pri-deadline-tip ${cls}">${prefix}${label}</span>`;
    }

    list.innerHTML = items.map(it => {
      const aOpts = AOPTS.map(n => `<option value="${n}"${it.assignee===n?' selected':''}>${n}</option>`).join('');
      const dl = priDateDisplay(it.deadline);
      const aEmpty = !it.assignee || it.assignee === '미정';
      const aText  = it.assignee || '미정';
      return `
      <div class="pri-item" data-card="${it.cardId}" data-idx="${it.idx}">
        <button class="status-btn" type="button" data-card="${it.cardId}" data-idx="${it.idx}" data-status="${it.status||''}">${it.status||''}</button>
        <div class="pri-body">
          <div class="pri-top-row">
            <div class="pri-card-name">${it.cardName}</div>
            <div class="pri-controls" data-date-cls="date-${dl.cls}">
              <div class="pri-ctrl-wrap" data-ctrl="date">
                <span class="pri-meta-tag date-${dl.cls}" title="더블클릭으로 수정">📅 ${dl.text}</span>
                <input type="date" class="pri-edit-input pri-deadline-input"
                  data-card="${it.cardId}" data-idx="${it.idx}" value="${it.deadline || ''}"/>
              </div>
              <div class="pri-ctrl-wrap" data-ctrl="assignee">
                <span class="pri-meta-tag date-${dl.cls}" title="더블클릭으로 수정">${aEmpty ? '👤' : '👤 ' + aText}</span>
                <select class="pri-edit-input pri-assignee-select"
                  data-card="${it.cardId}" data-idx="${it.idx}">${aOpts}</select>
              </div>
            </div>
          </div>
          <div class="pri-name-row">
            <div class="pri-item-name">${it.itemLabel}</div>
            ${it.memo ? `<span class="pri-memo-dot" data-memo="${it.memo.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"></span>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');

    /* 상태배지 클릭 → 스테이징만 (메인 미반영) */
    list.querySelectorAll('.pri-item .status-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const cardId = btn.dataset.card;
        const idx    = +btn.dataset.idx;
        const key    = `${cardId}__${idx}`;
        const cur    = btn.dataset.status || '';
        const next   = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
        if (!pendingChanges.has(key)) {
          pendingChanges.set(key, { newStatus: next, originalStatus: cur });
        } else {
          const orig = pendingChanges.get(key).originalStatus;
          if (next === orig) pendingChanges.delete(key);
          else               pendingChanges.get(key).newStatus = next;
        }
        btn.dataset.status = next;
        btn.textContent    = next;
        btn.closest('.pri-item')?.classList.toggle('pri-pending', pendingChanges.has(key));
        updatePriFooter();
        if (pendingChanges.has(key)) setupPriOutside();
      });
    });

    /* pending 상태 복원 (외부 rebuild 후에도 유지) */
    pendingChanges.forEach(({ newStatus }, key) => {
      const [cardId, idx] = key.split('__');
      const priItem = list.querySelector(`.pri-item[data-card="${cardId}"][data-idx="${idx}"]`);
      if (!priItem) { pendingChanges.delete(key); return; }
      const btn = priItem.querySelector('.status-btn');
      if (btn) { btn.dataset.status = newStatus; btn.textContent = newStatus; }
      priItem.classList.add('pri-pending');
    });

    updatePriFooter();

    /* 더블클릭 → 편집 모드 전환 */
    list.querySelectorAll('.pri-ctrl-wrap').forEach(wrap => {
      const badge  = wrap.querySelector('.pri-meta-tag');
      const editEl = wrap.querySelector('.pri-edit-input');
      badge.addEventListener('dblclick', () => {
        editEl.dataset.priOriginal = editEl.value;
        wrap.classList.add('editing');
        if (editEl.type === 'date') {
          editEl.focus();
          try { editEl.showPicker(); } catch(e) {}
        } else {
          editEl.setAttribute('size', AOPTS.length);
          editEl.focus();
        }
      });
      editEl.addEventListener('blur', () => {
        editEl.removeAttribute('size');
        wrap.classList.remove('editing');
      });
    });

    /* 마감기한 변경 — 즉시 UI 반영, 하단 버튼으로 확정 */
    list.querySelectorAll('.pri-deadline-input').forEach(inp => {
      inp.addEventListener('change', () => {
        const val = inp.value;
        const key = `${inp.dataset.card}__${inp.dataset.idx}`;
        const dl  = priDateDisplay(val);
        const controls = inp.closest('.pri-controls');
        const badge = inp.closest('.pri-ctrl-wrap').querySelector('.pri-meta-tag');
        if (badge) { badge.textContent = `📅 ${dl.text}`; badge.className = `pri-meta-tag date-${dl.cls}`; }
        if (controls) {
          controls.dataset.dateCls = `date-${dl.cls}`;
          const aBadge = controls.querySelector('[data-ctrl="assignee"] .pri-meta-tag');
          if (aBadge) aBadge.className = `pri-meta-tag date-${dl.cls}`;
        }
        inp.closest('.pri-ctrl-wrap').classList.remove('editing');
        const entry = pendingMetaChanges.get(key) || {};
        if (!('dateOld' in entry)) entry.dateOld = inp.dataset.priOriginal ?? '';
        entry.dateNew = val;
        pendingMetaChanges.set(key, entry);
        inp.closest('.pri-item')?.classList.add('pri-pending');
        updatePriFooter();
        setupPriOutside();
      });
    });

    /* 담당자 변경 — 즉시 UI 반영, 하단 버튼으로 확정 */
    list.querySelectorAll('.pri-assignee-select').forEach(sel => {
      sel.addEventListener('change', () => {
        const val = sel.value;
        const key = `${sel.dataset.card}__${sel.dataset.idx}`;
        const badge = sel.closest('.pri-ctrl-wrap').querySelector('.pri-meta-tag');
        if (badge) {
          const dateCls = sel.closest('.pri-controls')?.dataset.dateCls || 'date-empty';
          badge.textContent = (!val || val === '미정') ? '👤' : `👤 ${val}`;
          badge.className = `pri-meta-tag ${dateCls}`;
        }
        sel.removeAttribute('size');
        sel.closest('.pri-ctrl-wrap').classList.remove('editing');
        const entry = pendingMetaChanges.get(key) || {};
        if (!('assigneeOld' in entry)) entry.assigneeOld = sel.dataset.priOriginal ?? '';
        entry.assigneeNew = val;
        pendingMetaChanges.set(key, entry);
        sel.closest('.pri-item')?.classList.add('pri-pending');
        updatePriFooter();
        setupPriOutside();
      });
    });

  }

  /* 반영 버튼 */
  document.getElementById('priApplyBtn')?.addEventListener('click', () => {
    pendingChanges.forEach(({ newStatus }, key) => {
      const [cardId, idx] = key.split('__');
      const idxNum = +idx;
      if (newStatus) localStorage.setItem(`detail-${cardId}-${idxNum}-status`, newStatus);
      else           localStorage.removeItem(`detail-${cardId}-${idxNum}-status`);
      const mainItem = clItems(cardId)[idxNum];
      if (mainItem) {
        mainItem.querySelector('input').checked = (newStatus === '완료');
        const mainBtn = mainItem.querySelector('.status-btn');
        if (mainBtn) { mainBtn.dataset.status = newStatus; mainBtn.textContent = newStatus; }
        const info = getCardObject(cardId);
        if (info) updateCard(cardId, info.grade.id);
      }
      saveItemToSupabase(cardId, idxNum);
    });
    pendingChanges.clear();

    pendingMetaChanges.forEach(({ dateNew, assigneeNew }, key) => {
      const [cardId, idx] = key.split('__');
      const idxNum = +idx;
      if (dateNew !== undefined) {
        if (dateNew) localStorage.setItem(`detail-${cardId}-${idxNum}-deadline`, dateNew);
        else         localStorage.removeItem(`detail-${cardId}-${idxNum}-deadline`);
        const mainInp = document.querySelector(`.deadline-input[data-card="${cardId}"][data-idx="${idxNum}"]`);
        if (mainInp) { mainInp.value = dateNew; mainInp.closest('.checklist-item')?.classList.toggle('has-deadline', !!dateNew); }
        saveItemToSupabase(cardId, idxNum);
        document.dispatchEvent(new CustomEvent('deadline-updated'));
      }
      if (assigneeNew !== undefined) {
        if (assigneeNew) localStorage.setItem(`assignee-${cardId}-${idxNum}`, assigneeNew);
        else             localStorage.removeItem(`assignee-${cardId}-${idxNum}`);
        const mainSel = document.querySelector(`.assignee-select[data-card="${cardId}"][data-idx="${idxNum}"]`);
        if (mainSel) { mainSel.value = assigneeNew; mainSel.closest('.checklist-item')?.classList.toggle('has-assignee', assigneeNew !== '' && assigneeNew !== '미정'); }
        saveItemToSupabase(cardId, idxNum);
        document.dispatchEvent(new CustomEvent('assignee-updated'));
      }
    });
    teardownPriOutside();
    pendingMetaChanges.clear();

    buildPriority();
  });

  /* 취소 버튼 */
  document.getElementById('priCancelBtn')?.addEventListener('click', () => {
    document.querySelectorAll('#priList .pri-item').forEach(priEl => {
      const key = `${priEl.dataset.card}__${priEl.dataset.idx}`;
      if (pendingChanges.has(key)) {
        const original = pendingChanges.get(key).originalStatus;
        const btn = priEl.querySelector('.status-btn');
        if (btn) { btn.dataset.status = original; btn.textContent = original; }
      }
      if (pendingMetaChanges.has(key)) {
        const { dateOld, assigneeOld } = pendingMetaChanges.get(key);
        if (dateOld !== undefined) {
          const dl = priDateDisplay(dateOld);
          const controls = priEl.querySelector('.pri-controls');
          const badge = priEl.querySelector('[data-ctrl="date"] .pri-meta-tag');
          if (badge) { badge.textContent = `📅 ${dl.text}`; badge.className = `pri-meta-tag date-${dl.cls}`; }
          if (controls) {
            controls.dataset.dateCls = `date-${dl.cls}`;
            const aBadge = controls.querySelector('[data-ctrl="assignee"] .pri-meta-tag');
            if (aBadge) aBadge.className = `pri-meta-tag date-${dl.cls}`;
          }
          const inp = priEl.querySelector('.pri-deadline-input');
          if (inp) inp.value = dateOld;
        }
        if (assigneeOld !== undefined) {
          const dateCls = priEl.querySelector('.pri-controls')?.dataset.dateCls || 'date-empty';
          const badge = priEl.querySelector('[data-ctrl="assignee"] .pri-meta-tag');
          if (badge) {
            badge.textContent = (!assigneeOld || assigneeOld === '미정') ? '👤' : `👤 ${assigneeOld}`;
            badge.className = `pri-meta-tag ${dateCls}`;
          }
          const sel = priEl.querySelector('.pri-assignee-select');
          if (sel) sel.value = assigneeOld;
        }
      }
      if (pendingChanges.has(key) || pendingMetaChanges.has(key)) {
        priEl.classList.remove('pri-pending');
      }
    });
    pendingChanges.clear();
    teardownPriOutside();
    pendingMetaChanges.clear();
    updatePriFooter();
  });

  /* ── 전체 갱신 ── */
  function refresh() {
    buildBand();
    buildPriority();
    /* 모든 구간 100% 완료 시 로드맵 섹션 숨김 */
    let total = 0, done = 0;
    SEGS.forEach(seg => { const st = segStat(seg); total += st.total; done += st.done; });
    const band = document.querySelector('.roadmap-left');
    if (band) band.style.display = (total > 0 && done === total) ? 'none' : '';
  }

  refresh();

  document.addEventListener('change', e => {
    if (e.target.type === 'checkbox' && !e.target.closest('#priList'))
      requestAnimationFrame(refresh);
  });

  document.addEventListener('assignee-updated', () => requestAnimationFrame(buildPriority));
  document.addEventListener('deadline-updated',  () => requestAnimationFrame(buildPriority));
  document.addEventListener('dashboard-ready', refresh);
})();

/* ─── 담당자 상태배지 스테이징 ─── */
const pendingAssigneeChanges = new Map(); // "cardId__idx" → { newStatus, originalStatus }

function updateAtFooter() {
  const hasPending = pendingAssigneeChanges.size > 0;
  document.getElementById('atFooter')?.classList.toggle('visible', hasPending);
  document.querySelector('#mobileAssigneePanel .at-footer')?.classList.toggle('visible', hasPending);
}

function applyAtChanges() {
  const affected = new Set();
  pendingAssigneeChanges.forEach(({ newStatus }, key) => {
    const [cardId, idx] = key.split('__');
    const idxNum = +idx;
    if (newStatus) localStorage.setItem(`detail-${cardId}-${idxNum}-status`, newStatus);
    else           localStorage.removeItem(`detail-${cardId}-${idxNum}-status`);
    const mainItem = document.querySelectorAll(`#cl-${cardId} .checklist-item`)[idxNum];
    if (mainItem) {
      mainItem.querySelector('input').checked = (newStatus === '완료');
      const mainBtn = mainItem.querySelector('.status-btn');
      if (mainBtn) { mainBtn.dataset.status = newStatus; mainBtn.textContent = newStatus; }
    }
    affected.add(cardId);
    saveItemToSupabase(cardId, idxNum);
  });
  affected.forEach(cardId => {
    const info = getCardObject(cardId);
    if (info) updateCard(cardId, info.grade.id);
  });
  pendingAssigneeChanges.clear();
  document.dispatchEvent(new CustomEvent('status-updated'));
}

function cancelAtChanges() {
  document.querySelectorAll('.at-item').forEach(itemEl => {
    const key = `${itemEl.dataset.card}__${itemEl.dataset.idx}`;
    if (pendingAssigneeChanges.has(key)) {
      const original = pendingAssigneeChanges.get(key).originalStatus;
      const btn = itemEl.querySelector('.status-btn');
      if (btn) { btn.dataset.status = original; btn.textContent = original; }
      itemEl.classList.remove('at-pending');
    }
  });
  pendingAssigneeChanges.clear();
  updateAtFooter();
}

/* ─── 담당자별 공통 유틸 ─── */
function collectAssigneeTasks(name) {
  const tasks = [];
  GRADES.forEach(grade => {
    grade.semesters.forEach(sem => {
      sem.cards.forEach(card => {
        const isMig = localStorage.getItem('card-migrated-' + card.id) === '1';
        const baseItems  = isMig ? [] : card.items;
        const extraLabels = JSON.parse(localStorage.getItem('extra-items-' + card.id) || '[]');
        const baseCount  = baseItems.length;
        baseItems.forEach((item, i) => {
          if ((localStorage.getItem(`assignee-${card.id}-${i}`) || '미정').trim() !== name) return;
          const clItem = document.querySelectorAll(`#cl-${card.id} .checklist-item`)[i];
          if (clItem?.querySelector('input').checked) return;
          tasks.push({ cardId: card.id, idx: i,
            cardName: `${grade.name} ${sem.name} ${card.title}`, label: item.label,
            status: localStorage.getItem(`detail-${card.id}-${i}-status`) || '',
            memo:   localStorage.getItem(`detail-${card.id}-${i}-memo`)   || '' });
        });
        extraLabels.forEach((label, ei) => {
          const i = baseCount + ei;
          if ((localStorage.getItem(`assignee-${card.id}-${i}`) || '미정').trim() !== name) return;
          const clItem = document.querySelectorAll(`#cl-${card.id} .checklist-item`)[i];
          if (clItem?.querySelector('input').checked) return;
          tasks.push({ cardId: card.id, idx: i,
            cardName: `${grade.name} ${sem.name} ${card.title}`, label,
            status: localStorage.getItem(`detail-${card.id}-${i}-status`) || '',
            memo:   localStorage.getItem(`detail-${card.id}-${i}-memo`)   || '' });
        });
      });
    });
  });
  return tasks;
}

function renderAssigneeTasksHTML(tasks, color) {
  if (tasks.length === 0) return '<div class="assignee-empty">배정된 업무가 없습니다</div>';
  return tasks.map(t => `
    <div class="at-item" data-card="${t.cardId}" data-idx="${t.idx}">
      <div class="assignee-task">
        <button class="status-btn" type="button" data-card="${t.cardId}" data-idx="${t.idx}" data-status="${t.status||''}">${t.status||''}</button>
        <div class="assignee-task-info">
          <div class="assignee-task-card">${t.cardName}</div>
          <div class="assignee-task-label">${t.label}</div>
        </div>
        <button class="at-expand-btn${t.memo ? ' has-memo' : ''}" type="button" title="메모">···</button>
      </div>
      <div class="at-memo-row">
        <textarea class="at-memo" placeholder="메모를 입력하세요...">${t.memo.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</textarea>
      </div>
    </div>`).join('');
}

function bindAssigneeTasks(container) {
  container.querySelectorAll('.at-item').forEach(itemEl => {
    const cardId = itemEl.dataset.card;
    const idx    = +itemEl.dataset.idx;
    const statusBtn  = itemEl.querySelector('.status-btn');
    const expandBtn  = itemEl.querySelector('.at-expand-btn');
    const memoRow    = itemEl.querySelector('.at-memo-row');
    const memoTA     = itemEl.querySelector('.at-memo');

    if (statusBtn) {
      statusBtn.addEventListener('click', e => {
        e.stopPropagation();
        const key          = `${cardId}__${idx}`;
        const currentShown = statusBtn.dataset.status || '';
        const next         = STATUS_CYCLE[(STATUS_CYCLE.indexOf(currentShown) + 1) % STATUS_CYCLE.length];
        const originalStatus = pendingAssigneeChanges.has(key)
          ? pendingAssigneeChanges.get(key).originalStatus
          : (localStorage.getItem(`detail-${cardId}-${idx}-status`) || '');
        statusBtn.dataset.status = next;
        statusBtn.textContent    = next;
        if (next !== originalStatus) {
          pendingAssigneeChanges.set(key, { newStatus: next, originalStatus });
          itemEl.classList.add('at-pending');
        } else {
          pendingAssigneeChanges.delete(key);
          itemEl.classList.remove('at-pending');
        }
        updateAtFooter();
      });
    }

    if (expandBtn && memoRow && memoTA) {
      expandBtn.addEventListener('click', e => {
        e.stopPropagation();
        memoRow.classList.toggle('open');
        if (memoRow.classList.contains('open')) memoTA.focus();
      });
      memoTA.addEventListener('blur', () => {
        setTimeout(() => {
          if (!itemEl.contains(document.activeElement)) memoRow.classList.remove('open');
        }, 150);
      });
      memoTA.addEventListener('input', () => {
        const v = memoTA.value;
        if (v) localStorage.setItem(`detail-${cardId}-${idx}-memo`, v);
        else   localStorage.removeItem(`detail-${cardId}-${idx}-memo`);
        expandBtn.classList.toggle('has-memo', !!v);
        const mainItem = document.querySelectorAll(`#cl-${cardId} .checklist-item`)[idx];
        if (mainItem) {
          const mainMemoTA = mainItem.closest('.item-wrap')?.querySelector('.item-memo');
          if (mainMemoTA) { mainMemoTA.value = v; mainMemoTA.dispatchEvent(new Event('input')); }
        }
        saveItemToSupabase(cardId, idx);
      });
    }
  });

  // 페이지 재빌드 후 pending 상태 복원
  pendingAssigneeChanges.forEach(({ newStatus }, key) => {
    const [cId, i] = key.split('__');
    const el = container.querySelector(`.at-item[data-card="${cId}"][data-idx="${i}"]`);
    if (el) {
      const btn = el.querySelector('.status-btn');
      if (btn) { btn.dataset.status = newStatus; btn.textContent = newStatus; }
      el.classList.add('at-pending');
    }
  });

  // 모바일 패널 내부 footer 버튼 바인딩
  container.querySelector('.at-apply-btn')?.addEventListener('click', applyAtChanges);
  container.querySelector('.at-cancel-btn')?.addEventListener('click', cancelAtChanges);

  updateAtFooter();
}

/* ─── 담당자별 담당업무 ─── */
(function () {
  const collapsedCards = new Set(AOPTS);
  const toggleSVG = `<svg viewBox="0 0 16 16" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 8,11 13,5"/></svg>`;


  function buildAssigneeSection() {
    const grid = document.getElementById('assigneeGrid');
    if (!grid) return;

    const currentAssignees = AOPTS.map(n => ({ name: n, color: ASSIGNEE_COLOR_MAP[n] || '#94A7E8' }));

    currentAssignees.forEach(a => {
      const tasks = collectAssigneeTasks(a.name);
      let   card  = grid.querySelector(`.assignee-card[data-assignee="${a.name}"]`);

      if (!card) {
        card = document.createElement('div');
        card.className = 'assignee-card';
        card.dataset.assignee = a.name;
        if (collapsedCards.has(a.name)) card.classList.add('collapsed');
        card.innerHTML = `
          <div class="assignee-card-header">
            <div class="assignee-avatar" style="background:${a.color}">${a.name[0]}</div>
            ${a.name}
            <span class="assignee-count">${tasks.length}건</span>
            ${a.name !== '미정' ? `<button class="ac-delete" type="button" title="담당자 삭제">×</button>` : ''}
            <button class="ac-toggle" type="button">${toggleSVG}</button>
          </div>
          <div class="assignee-items">${renderAssigneeTasksHTML(tasks, a.color)}</div>`;
        card.querySelector('.ac-toggle').addEventListener('click', () => {
          card.classList.toggle('collapsed');
          if (card.classList.contains('collapsed')) collapsedCards.add(a.name);
          else collapsedCards.delete(a.name);
        });
        card.querySelector('.ac-delete')?.addEventListener('click', e => {
          e.stopPropagation();
          if (!confirm(`'${a.name}' 담당자를 삭제할까요?\n해당 담당자의 업무는 모두 미정으로 변경됩니다.`)) return;
          collapsedCards.delete(a.name);
          removeAssignee(a.name);
          document.dispatchEvent(new CustomEvent('assignee-updated'));
        });
        bindAssigneeTasks(card.querySelector('.assignee-items'));
        grid.appendChild(card);
      } else {
        const itemsDiv = card.querySelector('.assignee-items');
        const countEl  = card.querySelector('.assignee-count');
        if (itemsDiv) { itemsDiv.innerHTML = renderAssigneeTasksHTML(tasks, a.color); bindAssigneeTasks(itemsDiv); }
        if (countEl)  countEl.textContent = tasks.length + '건';
      }
    });

    /* AOPTS에 없는 카드 제거 (삭제 이후 rebuild 시) */
    grid.querySelectorAll('.assignee-card').forEach(c => {
      if (!AOPTS.includes(c.dataset.assignee)) c.remove();
    });

    /* '미정' 카드를 항상 맨 끝으로 이동 */
    const mijeongCard = grid.querySelector('.assignee-card[data-assignee="미정"]');
    if (mijeongCard) grid.appendChild(mijeongCard);
  }

  /* 담당자 추가 — 더블클릭으로 열기 */
  const addRow     = document.getElementById('assigneeAddRow');
  const addTrigger = document.getElementById('assigneeAddTrigger');
  const newInput   = document.getElementById('assigneeNewInput');
  const newConfirm = document.getElementById('assigneeNewConfirm');
  const newCancel  = document.getElementById('assigneeNewCancel');

  function openAddRow()  { addRow.classList.add('open'); newInput.value = ''; newInput.focus(); }
  function closeAddRow() { addRow.classList.remove('open'); }

  addTrigger?.addEventListener('dblclick', openAddRow);

  function doAddAssignee() {
    const name = newInput.value.trim();
    if (!name) { newInput.focus(); return; }
    if (addAssignee(name)) {
      collapsedCards.add(name);
      buildAssigneeSection();
      document.dispatchEvent(new CustomEvent('assignee-added', { detail: { name } }));
    }
    closeAddRow();
  }

  newConfirm?.addEventListener('click', doAddAssignee);
  newCancel?.addEventListener('click', closeAddRow);
  newInput?.addEventListener('keydown', e => {
    if (e.key === 'Enter') doAddAssignee();
    if (e.key === 'Escape') closeAddRow();
  });

  buildAssigneeSection();

  document.getElementById('atFooter')?.querySelector('.at-apply-btn')
    ?.addEventListener('click', applyAtChanges);
  document.getElementById('atFooter')?.querySelector('.at-cancel-btn')
    ?.addEventListener('click', cancelAtChanges);

  document.addEventListener('assignee-updated', buildAssigneeSection);
  document.addEventListener('status-updated',   () => requestAnimationFrame(buildAssigneeSection));
  document.addEventListener('dashboard-ready',  buildAssigneeSection);

  document.addEventListener('expand-assignee', e => {
    const name = e.detail?.name;
    const isMobile = window.innerWidth <= 640;
    document.querySelectorAll('.assignee-card').forEach(c => {
      if (c.dataset.assignee === name) {
        c.classList.remove('collapsed');
        c.style.display = '';
        collapsedCards.delete(name);
      } else {
        if (isMobile) {
          c.style.display = 'none';
        } else {
          c.classList.add('collapsed');
          collapsedCards.add(c.dataset.assignee);
        }
      }
    });
  });
})();

/* ─── 모바일 탭 뷰 ─── */
const MOB_SECTIONS = ['roadmap-section', 'assignee-section', 'type-section', 'main', 'add-task-section', 'schedule-section'];

function isMobView() { return window.innerWidth <= 640; }

function mobActivate(sectionId, activeEl) {
  if (!isMobView()) return;
  if (sectionId === 'type-section') {
    _embedCardsInTypeView();
    document.querySelectorAll('.grade-section').forEach(gs => gs.classList.add('collapsed'));
  } else {
    _restoreCardsFromTypeView();
  }
  MOB_SECTIONS.forEach(id => document.getElementById(id)?.classList.remove('mob-visible'));
  document.getElementById(sectionId)?.classList.add('mob-visible');
  document.querySelectorAll('.nav-item, .nav-sub-item').forEach(el => el.classList.remove('mob-active'));
  activeEl?.classList.add('mob-active');
  const titleEl = document.getElementById('mob-page-title');
  if (titleEl) titleEl.textContent = activeEl?.textContent || '';
  window.scrollTo({ top: 0, behavior: 'instant' });
}

let _typeCardsEmbedded = false;

function _embedCardsInTypeView() {
  if (_typeCardsEmbedded) return;
  _typeCardsEmbedded = true;
  ['study', 'unit', 'vod'].forEach(typeId => {
    const typeCard  = document.querySelector(`.type-card[data-type="${typeId}"]`);
    const container = typeCard?.querySelector('.type-expandable');
    if (!container) return;
    GRADES.forEach(grade => grade.semesters.forEach(sem => sem.cards.forEach(card => {
      if (card.type !== typeId) return;
      const el = document.getElementById('card-' + card.id);
      if (el) container.appendChild(el);
    })));
    // 모바일: 기본 닫힘 상태 유지 (사용자가 직접 토글)
  });
}

function _restoreCardsFromTypeView() {
  if (!_typeCardsEmbedded) return;
  _typeCardsEmbedded = false;
  document.querySelectorAll('.type-card').forEach(tc => tc.classList.remove('type-open'));
  /* GRADES 데이터 기준으로 각 학기 컨테이너에 직접 재삽입 (next 참조 방식보다 안정적) */
  GRADES.forEach(grade => {
    grade.semesters.forEach(sem => {
      const semKey = grade.id + 's' + sem.name.charAt(0);
      const semContainer = document.querySelector(`.semester-cards[data-sem-key="${semKey}"]`);
      if (!semContainer) return;
      sem.cards.forEach(card => {
        const el = document.getElementById('card-' + card.id);
        if (el) semContainer.appendChild(el);
      });
    });
  });
}

function initMobTabs() {
  if (!isMobView()) return;
  loadCalendar();
  mobActivate('schedule-section', document.getElementById('nav-schedule'));
}

function closeAllSectionCards() {
  document.querySelectorAll('.card.show-detail').forEach(c => {
    c.classList.remove('show-detail');
    const btn = c.querySelector('.detail-toggle-btn');
    if (btn) btn.textContent = '세부내용 보기';
  });
  if (document.querySelector('.type-card.type-open')) {
    _restoreCardsFromTypeView();
    document.querySelectorAll('.type-card').forEach(tc => tc.classList.remove('type-open'));
  }
  document.querySelectorAll('.grade-section:not(.collapsed)').forEach(gs => gs.classList.add('collapsed'));
  document.querySelectorAll('.assignee-card:not(.collapsed)').forEach(ac => ac.classList.add('collapsed'));
}

['nav-priority','nav-assignee','nav-type','nav-grade','nav-add','nav-schedule'].forEach(id => {
  const sectionMap = { 'nav-priority': 'roadmap-section', 'nav-assignee': 'assignee-section',
    'nav-type': 'type-section', 'nav-grade': 'main', 'nav-add': 'add-task-section',
    'nav-schedule': 'schedule-section' };
  document.getElementById(id)?.addEventListener('click', e => {
    closeAllSectionCards();
    if (id === 'nav-schedule') { loadCalendar(); }
    if (!isMobView()) return;
    e.preventDefault();
    if (id === 'nav-assignee') document.querySelectorAll('.assignee-card').forEach(c => { c.style.display = ''; });
    mobActivate(sectionMap[id], e.currentTarget);
  });
});

function buildAssigneeSubMenu() {
  const sub = document.getElementById('assigneeSubMenu');
  if (!sub) return;
  sub.innerHTML = '';
  AOPTS.filter(n => n !== '미정').forEach(name => {
    const el = document.createElement('a');
    el.className = 'nav-sub-item';
    el.textContent = name;
    el.addEventListener('click', e => {
      e.preventDefault();
      closeAllSectionCards();
      if (isMobView()) {
        mobActivate('assignee-section', el);
        const titleEl = document.getElementById('mob-page-title');
        if (titleEl) titleEl.textContent = '담당자별';
      } else {
        document.getElementById('assignee-section')?.scrollIntoView({ behavior: 'smooth' });
      }
      document.dispatchEvent(new CustomEvent('expand-assignee', { detail: { name } }));
    });
    sub.appendChild(el);
  });
}
document.addEventListener('dashboard-ready', buildAssigneeSubMenu);
document.addEventListener('dashboard-ready', initMobTabs);
document.addEventListener('assignee-updated', buildAssigneeSubMenu);
document.addEventListener('assignee-added',   buildAssigneeSubMenu);

/* ─── 자료유형별 완료율 ─── */
(function () {
  const TYPES = [
    { id: 'study', name: '달크업 세트', color: '#F8B84A' },
    { id: 'unit',  name: '단원평가',    color: '#E86050' },
    { id: 'vod',   name: '핵심콕VOD',   color: '#5068B5' },
  ];

  const _typeChevron = `<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,5 8,11 13,5"/></svg>`;

  function buildTypeSection() {
    const grid = document.getElementById('typeGrid');
    if (!grid) return;
    const stats = {};
    TYPES.forEach(t => { stats[t.id] = { total: 0, done: 0 }; });
    GRADES.forEach(grade => {
      grade.semesters.forEach(sem => {
        sem.cards.forEach(card => {
          if (!stats[card.type]) return;
          document.querySelectorAll(`#cl-${card.id} .checklist-item`).forEach(item => {
            stats[card.type].total++;
            if (item.querySelector('input').checked) stats[card.type].done++;
          });
        });
      });
    });

    /* 카드가 유형별 뷰에 임베드된 상태면 바만 업데이트 */
    if (_typeCardsEmbedded) {
      TYPES.forEach(t => {
        const typeCard = grid.querySelector(`.type-card[data-type="${t.id}"]`);
        if (!typeCard) return;
        const st = stats[t.id];
        const pct = st.total ? Math.round(st.done / st.total * 100) : 0;
        const fill = typeCard.querySelector('.type-bar-fill');
        if (fill) fill.style.width = pct + '%';
        const statsEl = typeCard.querySelector('.type-stats');
        if (statsEl) statsEl.innerHTML = `<span>${st.done}/${st.total} 완료</span><span class="type-pct" style="color:${t.color}">${pct}%</span>`;
      });
      return;
    }

    grid.innerHTML = TYPES.map(t => {
      const st = stats[t.id];
      const pct = st.total ? Math.round(st.done / st.total * 100) : 0;
      return `<div class="type-card" data-type="${t.id}">
        <div class="type-card-header">
          <div class="type-card-name"><span class="type-dot" style="background:${t.color}">${t.name[0]}</span>${t.name}</div>
          <button class="type-expand-btn" type="button" aria-label="펼치기">${_typeChevron}</button>
        </div>
        <div class="type-bar-track"><div class="type-bar-fill" style="width:${pct}%;background:${t.color}"></div></div>
        <div class="type-stats"><span>${st.done}/${st.total} 완료</span><span class="type-pct" style="color:${t.color}">${pct}%</span></div>
        <div class="type-expandable"></div>
      </div>`;
    }).join('');

    grid.querySelectorAll('.type-expand-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('.type-card');
        const wasOpen = card.classList.contains('type-open');
        if (!wasOpen) {
          _embedCardsInTypeView();
          card.classList.add('type-open');
          if (!isMobView()) {
            document.querySelectorAll('.grade-section').forEach(gs => gs.classList.add('collapsed'));
          }
        } else {
          card.classList.remove('type-open');
          if (!grid.querySelector('.type-card.type-open') && !isMobView()) _restoreCardsFromTypeView();
        }
      });
    });
  }

  buildTypeSection();
  document.addEventListener('change', e => {
    if (e.target.type === 'checkbox') requestAnimationFrame(buildTypeSection);
  });
  document.addEventListener('dashboard-ready', buildTypeSection);
})();
