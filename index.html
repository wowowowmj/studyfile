/* ─── 항목 삭제 헬퍼 ─── */
function getCardObject(cardId) {
  for (const grade of GRADES) {
    for (const sem of grade.semesters) {
      const card = sem.cards.find(c => c.id === cardId);
      if (card) return { card, grade, sem };
    }
  }
  const customCards = JSON.parse(localStorage.getItem('custom-cards') || '[]');
  const cc = customCards.find(c => c.id === cardId);
  if (cc) {
    if (cc.semKey === 'etc' || cc.gradeId === 'etc') {
      const fakeGrade = { id: 'etc', name: '기타', color: '#64748b', unitColor: '#64748b', vodColor: '#64748b', semesters: [] };
      const fakeSem   = { name: '' };
      return { card: { id: cc.id, type: 'custom', title: cc.title, items: [] }, grade: fakeGrade, sem: fakeSem };
    }
    const grade = GRADES.find(g => g.id === cc.gradeId);
    const sem   = grade?.semesters.find(s => s.name.charAt(0) === cc.semKey.slice(3));
    if (grade && sem) return { card: { id: cc.id, type: 'custom', title: cc.title, items: [] }, grade, sem };
  }
  return null;
}

/* 카드의 모든 항목을 extra-items로 통합 (최초 삭제 시 한 번만 실행) */
function migrateCardToExtra(cardId, card) {
  const states     = JSON.parse(localStorage.getItem('card-' + cardId) || '[]');
  const extraLabels = JSON.parse(localStorage.getItem('extra-items-' + cardId) || '[]');
  const baseLabels  = card.items.map(it => it.label);
  const allLabels   = [...baseLabels, ...extraLabels];
  const snap = allLabels.map((_, i) => ({
    done:     !!states[i],
    assignee: localStorage.getItem(`assignee-${cardId}-${i}`),
    deadline: localStorage.getItem(`detail-${cardId}-${i}-deadline`),
    memo:     localStorage.getItem(`detail-${cardId}-${i}-memo`),
    status:   localStorage.getItem(`detail-${cardId}-${i}-status`),
  }));
  /* 기존 키 전체 삭제 */
  for (let i = 0; i < allLabels.length; i++) {
    localStorage.removeItem(`assignee-${cardId}-${i}`);
    localStorage.removeItem(`detail-${cardId}-${i}-deadline`);
    localStorage.removeItem(`detail-${cardId}-${i}-memo`);
    localStorage.removeItem(`detail-${cardId}-${i}-status`);
  }
  /* extra-items로 통합 저장 */
  localStorage.setItem('extra-items-' + cardId, JSON.stringify(allLabels));
  localStorage.setItem('card-' + cardId, JSON.stringify(snap.map(s => s.done)));
  snap.forEach((s, i) => {
    if (s.assignee) localStorage.setItem(`assignee-${cardId}-${i}`, s.assignee);
    if (s.deadline) localStorage.setItem(`detail-${cardId}-${i}-deadline`, s.deadline);
    if (s.memo)     localStorage.setItem(`detail-${cardId}-${i}-memo`, s.memo);
    if (s.status)   localStorage.setItem(`detail-${cardId}-${i}-status`, s.status);
  });
  localStorage.setItem('card-migrated-' + cardId, '1');
}

function deleteItem(cardId, itemIdx, baseCount) {
  const info = getCardObject(cardId);
  if (!info) return;
  const { card, grade, sem } = info;

  /* 아직 마이그레이션 전이면 먼저 통합 */
  if (localStorage.getItem('card-migrated-' + cardId) !== '1' && card.items.length > 0) {
    migrateCardToExtra(cardId, card);
    /* 마이그레이션 후 effectiveBaseCount = 0, itemIdx는 그대로 유지 */
  }

  /* 이제 모든 항목이 extra-items에 있음 */
  const extras = JSON.parse(localStorage.getItem('extra-items-' + cardId) || '[]');
  extras.splice(itemIdx, 1);
  localStorage.setItem('extra-items-' + cardId, JSON.stringify(extras));

  /* 이후 항목 키 한 칸 앞당기기 */
  for (let j = itemIdx; j < extras.length; j++) {
    const o = j + 1, n = j;
    const av = localStorage.getItem(`assignee-${cardId}-${o}`);
    const dv = localStorage.getItem(`detail-${cardId}-${o}-deadline`);
    const mv = localStorage.getItem(`detail-${cardId}-${o}-memo`);
    const sv = localStorage.getItem(`detail-${cardId}-${o}-status`);
    if (av !== null) localStorage.setItem(`assignee-${cardId}-${n}`, av); else localStorage.removeItem(`assignee-${cardId}-${n}`);
    if (dv !== null) localStorage.setItem(`detail-${cardId}-${n}-deadline`, dv); else localStorage.removeItem(`detail-${cardId}-${n}-deadline`);
    if (mv !== null) localStorage.setItem(`detail-${cardId}-${n}-memo`, mv); else localStorage.removeItem(`detail-${cardId}-${n}-memo`);
    if (sv !== null) localStorage.setItem(`detail-${cardId}-${n}-status`, sv); else localStorage.removeItem(`detail-${cardId}-${n}-status`);
    localStorage.removeItem(`assignee-${cardId}-${o}`);
    localStorage.removeItem(`detail-${cardId}-${o}-deadline`);
    localStorage.removeItem(`detail-${cardId}-${o}-memo`);
    localStorage.removeItem(`detail-${cardId}-${o}-status`);
  }
  const last = extras.length;
  localStorage.removeItem(`assignee-${cardId}-${last}`);
  localStorage.removeItem(`detail-${cardId}-${last}-deadline`);
  localStorage.removeItem(`detail-${cardId}-${last}-memo`);
  localStorage.removeItem(`detail-${cardId}-${last}-status`);

  /* states 배열 업데이트 */
  const states = JSON.parse(localStorage.getItem('card-' + cardId) || '[]');
  states.splice(itemIdx, 1);
  localStorage.setItem('card-' + cardId, JSON.stringify(states));

  /* 카드 DOM 재빌드 */
  const cardEl = document.getElementById('card-' + cardId);
  if (!cardEl) return;

  /* 남은 항목이 0개면 카드 자체를 제거 */
  const remainingExtras = JSON.parse(localStorage.getItem('extra-items-' + cardId) || '[]');
  if (remainingExtras.length === 0) {
    cardEl.remove();
    ['extra-items-', 'card-', 'card-migrated-'].forEach(p => localStorage.removeItem(p + cardId));
    if (cardId.startsWith('custom-')) {
      const cc = JSON.parse(localStorage.getItem('custom-cards') || '[]');
      localStorage.setItem('custom-cards', JSON.stringify(cc.filter(c => c.id !== cardId)));
    }
    updateGrade(grade.id);
    updateOverall();
    document.dispatchEvent(new CustomEvent('assignee-updated'));
    return;
  }

  const newEl = buildCard(card, grade.color, grade.unitColor, grade.vodColor || grade.unitColor, grade.id, grade.name, sem.name);
  cardEl.replaceWith(newEl);
  if (!newEl.querySelector('.checklist-item')) {
    newEl.remove();
    ['extra-items-', 'card-', 'card-migrated-'].forEach(p => localStorage.removeItem(p + cardId));
    if (cardId.startsWith('custom-')) {
      const cc = JSON.parse(localStorage.getItem('custom-cards') || '[]');
      localStorage.setItem('custom-cards', JSON.stringify(cc.filter(c => c.id !== cardId)));
    }
    updateGrade(grade.id);
    updateOverall();
    document.dispatchEvent(new CustomEvent('assignee-updated'));
    return;
  }
  updateCard(cardId, grade.id);
  document.dispatchEvent(new CustomEvent('assignee-updated'));
}

/* ─── 항목 순서 이동 ─── */
/* newOrder: 새 DOM 위치[i]에 들어갈 원래 data-idx 값들의 배열 */
function applyReorder(cardId, newOrder) {
  const info = getCardObject(cardId);
  if (!info) return;
  const { card, grade, sem } = info;

  if (localStorage.getItem('card-migrated-' + cardId) !== '1' && card.items.length > 0)
    migrateCardToExtra(cardId, card);

  const extras = JSON.parse(localStorage.getItem('extra-items-' + cardId) || '[]');
  const states = JSON.parse(localStorage.getItem('card-' + cardId) || '[]');

  const snapshot = newOrder.map(oldIdx => ({
    label:    extras[oldIdx] ?? '',
    state:    !!states[oldIdx],
    assignee: localStorage.getItem(`assignee-${cardId}-${oldIdx}`),
    deadline: localStorage.getItem(`detail-${cardId}-${oldIdx}-deadline`),
    memo:     localStorage.getItem(`detail-${cardId}-${oldIdx}-memo`),
    status:   localStorage.getItem(`detail-${cardId}-${oldIdx}-status`),
  }));

  localStorage.setItem('extra-items-' + cardId, JSON.stringify(snapshot.map(s => s.label)));
  localStorage.setItem('card-' + cardId, JSON.stringify(snapshot.map(s => s.state)));
  snapshot.forEach((s, i) => {
    if (s.assignee !== null) localStorage.setItem(`assignee-${cardId}-${i}`, s.assignee);
    else localStorage.removeItem(`assignee-${cardId}-${i}`);
    if (s.deadline !== null) localStorage.setItem(`detail-${cardId}-${i}-deadline`, s.deadline);
    else localStorage.removeItem(`detail-${cardId}-${i}-deadline`);
    if (s.memo !== null) localStorage.setItem(`detail-${cardId}-${i}-memo`, s.memo);
    else localStorage.removeItem(`detail-${cardId}-${i}-memo`);
    if (s.status !== null) localStorage.setItem(`detail-${cardId}-${i}-status`, s.status);
    else localStorage.removeItem(`detail-${cardId}-${i}-status`);
  });
  for (let i = snapshot.length; i < extras.length; i++) {
    localStorage.removeItem(`assignee-${cardId}-${i}`);
    localStorage.removeItem(`detail-${cardId}-${i}-deadline`);
    localStorage.removeItem(`detail-${cardId}-${i}-memo`);
    localStorage.removeItem(`detail-${cardId}-${i}-status`);
  }

  const cardEl = document.getElementById('card-' + cardId);
  if (!cardEl) return;
  const newEl = buildCard(card, grade.color, grade.unitColor, grade.vodColor || grade.unitColor, grade.id, grade.name, sem.name);
  cardEl.replaceWith(newEl);
  updateCard(cardId, grade.id);
}

/* ─── 커스텀 카드 생성/재렌더링 ─── */
function getOrCreateCustomCard(semKey, customType) {
  const safeType = customType.replace(/\s+/g, '_');
  const cardId   = 'custom-' + semKey + '-' + safeType;

  /* 이미 DOM에 있으면 바로 반환 */
  if (document.getElementById('card-' + cardId)) return cardId;

  /* 기타 섹션 처리 */
  if (semKey === 'etc') {
    const stack = document.querySelector('.semester-cards[data-sem-key="etc"]');
    if (!stack) return null;
    const customCards = JSON.parse(localStorage.getItem('custom-cards') || '[]');
    if (!customCards.find(c => c.id === cardId)) {
      customCards.push({ id: cardId, semKey: 'etc', gradeId: 'etc', title: customType });
      localStorage.setItem('custom-cards', JSON.stringify(customCards));
    }
    const card = { id: cardId, type: 'custom', title: customType, items: [] };
    const el = buildCard(card, '#64748b', '#64748b', '#64748b', 'etc', '기타', '');
    stack.appendChild(el);
    document.getElementById('grade-section-etc')?.classList.remove('collapsed');
    return cardId;
  }

  /* localStorage에 저장 */
  const gradeId = semKey.slice(0, 2);
  const grade   = GRADES.find(g => g.id === gradeId);
  if (!grade) return null;
  const semNum  = semKey.slice(3);
  const sem     = grade.semesters.find(s => s.name.charAt(0) === semNum);
  if (!sem) return null;

  const customCards = JSON.parse(localStorage.getItem('custom-cards') || '[]');
  if (!customCards.find(c => c.id === cardId)) {
    customCards.push({ id: cardId, semKey, gradeId, title: customType });
    localStorage.setItem('custom-cards', JSON.stringify(customCards));
  }

  /* 카드 렌더링 */
  const card  = { id: cardId, type: 'custom', title: customType, items: [] };
  const el    = buildCard(card, grade.color, grade.unitColor, grade.vodColor || grade.unitColor, grade.id, grade.name, sem.name);
  const stack = document.querySelector('.semester-cards[data-sem-key="' + semKey + '"]');
  if (!stack) return null;
  stack.appendChild(el);

  /* 해당 학년 섹션 펼치기 */
  stack.closest('.grade-section')?.classList.remove('collapsed');
  return cardId;
}

function renderCustomCards() {
  const customCards = JSON.parse(localStorage.getItem('custom-cards') || '[]');
  customCards.forEach(cc => {
    if (document.getElementById('card-' + cc.id)) return;
    if (cc.semKey === 'etc' || cc.gradeId === 'etc') {
      const stack = document.querySelector('.semester-cards[data-sem-key="etc"]');
      if (!stack) return;
      const card = { id: cc.id, type: 'custom', title: cc.title, items: [] };
      const el = buildCard(card, '#64748b', '#64748b', '#64748b', 'etc', '기타', '');
      stack.appendChild(el);
      updateCard(cc.id, 'etc');
      return;
    }
    const grade = GRADES.find(g => g.id === cc.gradeId);
    if (!grade) return;
    const sem = grade.semesters.find(s => s.name.charAt(0) === cc.semKey.slice(3));
    if (!sem) return;
    const card = { id: cc.id, type: 'custom', title: cc.title, items: [] };
    const el   = buildCard(card, grade.color, grade.unitColor, grade.vodColor || grade.unitColor, grade.id, grade.name, sem.name);
    const stack = document.querySelector('.semester-cards[data-sem-key="' + cc.semKey + '"]');
    if (stack) { stack.appendChild(el); updateCard(cc.id, cc.gradeId); }
  });
}

/* ─── 신규 업무 추가 — 전역 함수 ─── */
function toggleAtTypeField(semVal) {
  var typeField = document.getElementById('atType')?.closest('.at-field');
  if (!typeField) return;
  if (semVal === 'etc') {
    typeField.style.display = 'none';
    document.getElementById('atType').value = '';
    var ci = document.getElementById('atTypeCustom');
    if (ci) { ci.value = ''; ci.style.display = 'none'; }
  } else {
    typeField.style.display = '';
  }
}

function atRebuildAssignee() {
  var sel = document.getElementById('atAssignee');
  if (!sel) return;
  var cur = sel.value;
  sel.innerHTML = '';
  var ph = document.createElement('option');
  ph.value = ''; ph.textContent = '선택'; ph.disabled = true;
  ph.selected = (!cur || !AOPTS.includes(cur));
  sel.appendChild(ph);
  AOPTS.forEach(function(n) {
    var opt = document.createElement('option');
    opt.value = n; opt.textContent = n;
    if (n === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}


function doAtSubmit() {
  var sem   = (document.getElementById('atSem')?.value   || '');
  var type  = (document.getElementById('atType')?.value  || '');
  var label = (document.getElementById('atLabel')?.value || '').trim();
  if (!sem)   { document.getElementById('atSem')?.focus();   return; }
  if (sem !== 'etc' && !type) { document.getElementById('atType')?.focus(); return; }
  if (!label) { document.getElementById('atLabel')?.focus(); return; }

  var cardId;
  if (sem === 'etc') {
    cardId = getOrCreateCustomCard('etc', '기타');
    if (!cardId) { alert('카드 생성에 실패했습니다.'); return; }
  } else if (type === 'custom') {
    var ct = (document.getElementById('atTypeCustom')?.value || '').trim();
    if (!ct) { document.getElementById('atTypeCustom')?.focus(); return; }
    cardId = getOrCreateCustomCard(sem, ct);
    if (!cardId) { alert('카드 생성에 실패했습니다.'); return; }
  } else {
    cardId = sem + '-' + type;
  }

  var inp = document.querySelector('#add-row-' + cardId + ' .add-item-input');
  var btn = document.querySelector('#add-row-' + cardId + ' .add-item-confirm');
  if (!inp || !btn) { alert('해당 카드를 찾을 수 없습니다.'); return; }
  inp.value = label;
  btn.click();

  /* 담당자·마감기한 적용 */
  requestAnimationFrame(function() {
    var items   = document.querySelectorAll('#cl-' + cardId + ' .checklist-item');
    var newItem = items[items.length - 1];
    if (!newItem) return;
    var assignee = document.getElementById('atAssignee')?.value;
    if (assignee) {
      var s = newItem.parentElement?.querySelector('.assignee-select');
      if (s) { s.value = assignee; s.dispatchEvent(new Event('change')); }
    }

/* ▼▼▼ 캘린더 공개 iCal URL 입력
   Google Calendar → 캘린더 설정 → "캘린더 통합" → "공개 주소(iCal 형식)" 복사 ▼▼▼ */
const CAL_ICS_GRADE3 = 'https://calendar.google.com/calendar/ical/c_ad7471308f6d124f05af0dde41a7d6c23e2a5d3f58d61d3309a18415ad57704c%40group.calendar.google.com/private-286ee87b43404a7210a698022972d640/basic.ics';
const CAL_ICS_GRADE4 = 'https://calendar.google.com/calendar/ical/c_a3e0a4f50ccb76d9a1aa39c15251f58793629bd8da63ade05068d9b4177ca64d%40group.calendar.google.com/private-eb15422a678a65d852f3c12abdec388b/basic.ics';
/* ▲▲▲ 설정 끝 ▲▲▲ */

/* { u: proxy URL prefix, json: true이면 응답을 JSON으로 파싱해 .contents 추출 } */
const CORS_PROXIES = [
  { u: 'https://corsproxy.io/?',                          json: false },
  { u: 'https://api.allorigins.win/raw?url=',             json: false },
  { u: 'https://api.allorigins.win/get?url=',             json: true  },
  { u: 'https://api.codetabs.com/v1/proxy?quest=',        json: false },
  { u: 'https://thingproxy.freeboard.io/fetch/',          json: false },
];

const CAL_COLORS = {
  grade3: { bg: '#FDE8F1', text: '#9D174D', dot: '#F9A8D4', name: '3학년 일정' },
  grade4: { bg: '#FEF3C7', text: '#92400E', dot: '#FCD34D', name: '4학년 일정' }
};

let calYear        = new Date().getFullYear();
let calMonth       = new Date().getMonth();
let calAllEvents   = null;
let calGradeFilter = 'all'; // 'all' | 'grade3' | 'grade4'
let _calLoadPromise = null; // 동시 로드 중복 방지

/* ICS 텍스트 파싱 */
function parseICS(text, grade) {
  // 줄 이어붙이기 (line folding 해제)
  text = text.replace(/\r\n /g, '').replace(/\r\n\t/g, '').replace(/\r/g, '');
  var lines  = text.split('\n');
  var events = [];
  var inEv   = false;
  var ev     = null;

  lines.forEach(function(raw) {
    var line = raw.trim();
    if (line === 'BEGIN:VEVENT') { inEv = true; ev = { _grade: grade }; return; }
    if (line === 'END:VEVENT')   { if (ev) events.push(ev); inEv = false; ev = null; return; }
    if (!inEv || !ev) return;

    var ci = line.indexOf(':');
    if (ci < 0) return;
    var propRaw  = line.slice(0, ci);
    var val      = line.slice(ci + 1);
    var propName = propRaw.split(';')[0].toUpperCase();

    if      (propName === 'SUMMARY')     ev.summary     = icsText(val);
    else if (propName === 'DESCRIPTION') ev.description = icsText(val);
    else if (propName === 'LOCATION')    ev.location    = icsText(val);
    else if (propName === 'DTSTART')     ev.start       = icsDate(propRaw, val);
    else if (propName === 'DTEND')       ev.end         = icsDate(propRaw, val);
    else if (propName === 'UID')         ev.id          = val;
  });
  return events;
}

function icsText(v) {
  return v.replace(/\\n/g, '\n').replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\\\/g, '\\');
}

function icsDate(propRaw, val) {
  var isAllDay = propRaw.toUpperCase().indexOf('VALUE=DATE') >= 0 ||
                 (val.indexOf('T') < 0 && val.length === 8);
  if (isAllDay) {
    return { date: val.slice(0,4) + '-' + val.slice(4,6) + '-' + val.slice(6,8) };
  }
  var y   = val.slice(0,4), mo = val.slice(4,6), d  = val.slice(6,8);
  var h   = val.slice(9,11), mi = val.slice(11,13), s = val.slice(13,15);
  var utc = val.endsWith('Z');
  return { dateTime: y+'-'+mo+'-'+d+'T'+h+':'+mi+':'+s+(utc?'Z':'') };
}

/* 타임아웃 fetch */
function fetchWithTimeout(url, ms, opts) {
  var ctrl = new AbortController();
  var tid  = setTimeout(function() { ctrl.abort(); }, ms || 8000);
  return fetch(url, Object.assign({ signal: ctrl.signal, cache: 'no-store' }, opts || {}))
    .finally(function() { clearTimeout(tid); });
}

/* Promise.any 폴리필 (구형 브라우저 대응) */
if (typeof Promise.any !== 'function') {
  Promise.any = function(promises) {
    return new Promise(function(resolve, reject) {
      var errors = [], left = promises.length;
      if (!left) { reject(new Error('No promises')); return; }
      promises.forEach(function(p, i) {
        Promise.resolve(p).then(resolve, function(e) {
          errors[i] = e; if (--left === 0) reject(new Error('All failed'));
        });
      });
    });
  };
}

/* 모든 프록시 동시 요청 → 제일 빠른 성공 하나 사용 */
async function fetchViaProxy(icsUrl, bustCache) {
  var encoded  = encodeURIComponent(icsUrl);
  var cacheSfx = bustCache ? ('&_cb=' + Date.now()) : '';

  var proxyAttempts = CORS_PROXIES.map(function(proxy) {
    var url = proxy.u + encoded + cacheSfx;
    return (async function() {
      var res = await fetchWithTimeout(url, 10000, { cache: 'default' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var text = proxy.json ? (await res.json()).contents : await res.text();
      if (!text || !text.includes('BEGIN:VCALENDAR')) throw new Error('ICS 형식 아님');
      console.log('[캘린더] 성공:', proxy.u);
      return text;
    })();
  });

  try {
    return await Promise.any(proxyAttempts);
  } catch(ae) {
    throw new Error('캘린더를 불러올 수 없습니다 (네트워크 확인)');
  }
}

/* ICS 파일 fetch → 파싱 */
async function fetchICS(url, grade, bustCache) {
  var text = await fetchViaProxy(url, bustCache);
  return parseICS(text, grade);
}

/* Google Calendar API로 이벤트 가져오기 (로그인 상태) */
async function fetchEventsViaAPI() {
  var results = [];
  var sources = [
    { id: CAL_WRITE_IDS.grade3, grade: 'grade3' },
    { id: CAL_WRITE_IDS.grade4, grade: 'grade4' }
  ];
  await Promise.all(sources.map(async function(src) {
    try {
      var url = CAL_API_BASE + '/' + encodeURIComponent(src.id) +
        '/events?singleEvents=true&orderBy=startTime&maxResults=2500';
      var res = await fetch(url, {
        headers: { 'Authorization': 'Bearer ' + calAccessToken },
        cache: 'no-store'
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      (data.items || []).forEach(function(ev) {
        results.push(Object.assign({}, ev, {
          _grade: src.grade,
          start: ev.start,
          end:   ev.end
        }));
      });
    } catch(e) { console.warn('API 로드 실패 (' + src.grade + '):', e); }
  }));
  return results;
}

/* 전체 이벤트 로드 (캐시 활용 + 중복 요청 방지) */
async function loadAllEvents(bustCache) {
  if (calAllEvents !== null && !bustCache) return calAllEvents;
  if (_calLoadPromise && !bustCache) return _calLoadPromise;

  _calLoadPromise = (async function() {
    var results = [];
    var errors  = [];

    /* 로그인 상태면 API로, 아니면 ICS로 */
    if (calAccessToken) {
      try {
        results = await fetchEventsViaAPI();
        console.log('[캘린더] API 로드 성공:', results.length + '개');
      } catch(e) {
        errors.push('API: ' + e.message);
      }
    } else {
      var sources = [
        { url: CAL_ICS_GRADE3, grade: 'grade3' },
        { url: CAL_ICS_GRADE4, grade: 'grade4' }
      ];
      await Promise.all(sources.map(async function(src) {
        try {
          var evs = await fetchICS(src.url, src.grade, bustCache);
          evs.forEach(function(e) { results.push(e); });
        } catch(e) {
          errors.push(src.grade + ': ' + e.message);
          console.warn('ICS 로드 실패 (' + src.grade + '):', e);
        }
      }));
      if (errors.length === 2) throw new Error(errors.join(' / '));
    }

    results.sort(function(a, b) {
      var aD = (a.start && (a.start.dateTime || a.start.date)) || '';
      var bD = (b.start && (b.start.dateTime || b.start.date)) || '';
      return aD.localeCompare(bD);
    });
    calAllEvents = results;
    return results;
  })();

  try {
    return await _calLoadPromise;
  } finally {
    _calLoadPromise = null;
  }
}

/* 이벤트의 실제 마지막 날 (all-day end는 exclusive이므로 -1일) */
function getEventEndDateStr(ev) {
  var isAllDay = ev.start && ev.start.date && !ev.start.dateTime;
  if (isAllDay) {
    if (ev.end && ev.end.date) {
      var d = new Date(ev.end.date + 'T00:00:00');
      d.setDate(d.getDate() - 1);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    return (ev.start.date || '').slice(0, 10);
  }
  return ev.end && ev.end.dateTime ? ev.end.dateTime.slice(0, 10)
       : (ev.start && ev.start.dateTime ? ev.start.dateTime.slice(0, 10) : '');
}

/* 기간형 이벤트 → 해당하는 모든 YYYY-MM-DD 배열 반환 */
function getEventDateKeys(ev) {
  var isAllDay = ev.start && ev.start.date && !ev.start.dateTime;
  var startStr = isAllDay
    ? (ev.start.date || '').slice(0, 10)
    : (ev.start && ev.start.dateTime ? ev.start.dateTime.slice(0, 10) : '');
  if (!startStr) return [];
  var endStr = getEventEndDateStr(ev);
  if (endStr < startStr) endStr = startStr;

  var keys = [], cur = new Date(startStr + 'T00:00:00'), end = new Date(endStr + 'T00:00:00');
  while (cur <= end) {
    keys.push(cur.getFullYear() + '-' + String(cur.getMonth()+1).padStart(2,'0') + '-' + String(cur.getDate()).padStart(2,'0'));
    cur = new Date(cur.getTime() + 86400000);
  }
  return keys.length ? keys : [startStr];
}

/* 시작일 단일 키 (정렬·편집용) */
function getEventDateKey(ev) {
  var s = (ev.start && (ev.start.dateTime || ev.start.date)) || '';
  return s.slice(0, 10);
}

/* 해당 월에 걸치는 이벤트 필터링 (기간형 포함) */
function filterByMonth(events, y, m) {
  var lastDate = new Date(y, m + 1, 0);
  var firstStr = y + '-' + String(m + 1).padStart(2, '0') + '-01';
  var lastStr  = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(lastDate.getDate()).padStart(2, '0');
  return events.filter(function(ev) {
    var startStr = getEventDateKey(ev);
    if (!startStr) return false;
    var endStr = getEventEndDateStr(ev) || startStr;
    return startStr <= lastStr && endStr >= firstStr;
  });
}

function buildWeekdayCells(y, m) {
  var cells = [];
  var first = new Date(y, m, 1);
  var last  = new Date(y, m + 1, 0);

  // 첫 행 시작: 1일이 포함된 주의 월요일
  var fd   = first.getDay();
  var back = (fd === 0) ? 6 : fd - 1;
  var cur  = new Date(y, m, 1 - back);

  // 마지막 행 끝: 마지막 날이 포함된 주의 금요일
  var ld  = last.getDay();
  var end = new Date(last);
  if      (ld === 0) end.setDate(end.getDate() - 2);
  else if (ld === 6) end.setDate(end.getDate() - 1);
  else               end.setDate(end.getDate() + (5 - ld));

  while (cur <= end) {
    var dow = cur.getDay();
    if (dow >= 1 && dow <= 5) {
      cells.push({
        day: cur.getDate(), other: cur.getMonth() !== m, dow: dow,
        dateKey: cur.getFullYear() + '-' + String(cur.getMonth()+1).padStart(2,'0') + '-' + String(cur.getDate()).padStart(2,'0')
      });
    }
    cur = new Date(cur.getTime() + 86400000);
  }
  return cells;
}

function renderCalendar(events) {
  var grid = document.getElementById('calGrid');
  if (!grid) return;

  var label = document.getElementById('calMonthLabel');
  if (label) label.textContent = calYear + '년 ' + (calMonth + 1) + '월';

  // 학년 필터 적용
  if (calGradeFilter !== 'all') {
    events = events.filter(function(ev) { return ev._grade === calGradeFilter; });
  }

  var today    = new Date();
  var todayKey = today.getFullYear() + '-' +
    String(today.getMonth() + 1).padStart(2, '0') + '-' +
    String(today.getDate()).padStart(2, '0');

  var byDate = {};
  events.forEach(function(ev) {
    getEventDateKeys(ev).forEach(function(k) {
      if (!byDate[k]) byDate[k] = [];
      byDate[k].push(ev);
    });
  });

  var cells = buildWeekdayCells(calYear, calMonth);

  grid.innerHTML = '';
  cells.forEach(function(cell) {
    var el   = document.createElement('div');
    var cls  = ['cal-day'];
    if (cell.other)                cls.push('other-month');
    if (cell.dateKey === todayKey) cls.push('today');
    if (calEditMode)               cls.push('edit-mode');
    el.className = cls.join(' ');
    el.dataset.dateKey = cell.dateKey;

    var numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = cell.day;
    el.appendChild(numEl);

    var dayEvs = byDate[cell.dateKey] || [];
    if (dayEvs.length) {
      var wrap   = document.createElement('div');
      wrap.className = 'cal-events';
      var MAX    = 3;
      var shown  = dayEvs.slice(0, MAX);
      var hidden = dayEvs.slice(MAX);

      shown.forEach(function(ev) {
        wrap.appendChild(makeEventEl(ev));
      });

      if (hidden.length) {
        var more = document.createElement('div');
        more.className = 'cal-event more';
        more.textContent = '+' + hidden.length + '개 더';
        more.addEventListener('click', function(e) {
          e.stopPropagation();
          more.remove();
          hidden.forEach(function(ev) { wrap.appendChild(makeEventEl(ev)); });
        });
        wrap.appendChild(more);
      }
      el.appendChild(wrap);
    }
    el.addEventListener('click', function() { openCalDayModal(cell.dateKey); });
    grid.appendChild(el);
  });

  if (CAL_ICS_GRADE3 === 'YOUR_GRADE3_ICS_URL') {
    var notice = document.createElement('div');
    notice.className = 'cal-config-notice';
    notice.innerHTML = '📌 Google Calendar를 연결하려면 JS 상단의 <b>CAL_ICS_GRADE3 / CAL_ICS_GRADE4</b>에 iCal URL을 입력하세요';
    grid.appendChild(notice);
  }
}

function makeEventEl(ev) {
  var grade = ev._grade;
  var col   = CAL_COLORS[grade];
  var el    = document.createElement('div');
  el.className = 'cal-event ' + grade;
  el.style.background = col.bg;
  el.style.color      = col.text;

  var txt = document.createElement('span');
  txt.textContent = ev.summary || '(제목 없음)';
  txt.style.overflow = 'hidden'; txt.style.textOverflow = 'ellipsis'; txt.style.whiteSpace = 'nowrap';
  el.appendChild(txt);

  return el;
}

async function loadCalendar(bustCache) {
  var grid  = document.getElementById('calGrid');
  var label = document.getElementById('calMonthLabel');
  if (!grid) return;
  if (label) label.textContent = calYear + '년 ' + (calMonth + 1) + '월';

  if (!calAllEvents) {
    grid.innerHTML = '<div class="cal-loading">캘린더를 불러오는 중...</div>';
  }

  try {
    var all    = await loadAllEvents(bustCache);
    var events = filterByMonth(all, calYear, calMonth);
    renderCalendar(events);
    console.log('[캘린더] 렌더 완료 — 전체 이벤트:', all.length, '/ 이번 달:', events.length);
  } catch(e) {
    console.error('[캘린더] 최종 오류:', e);
    grid.innerHTML = '<div class="cal-error">일정을 불러오지 못했습니다.<br><small>' + e.message + '</small></div>';
  }
}

function openCalEventModal(ev) {
  var grade   = ev._grade;
  var col     = CAL_COLORS[grade];
  var dot     = document.getElementById('calModalDot');
  var title   = document.getElementById('calModalTitle');
  var calLbl  = document.getElementById('calModalCal');
  var dateLbl = document.getElementById('calModalDate');
  var timeLbl = document.getElementById('calModalTime');
  var timeRow = document.getElementById('calModalTimeRow');
  var descLbl = document.getElementById('calModalDesc');
  var descRow = document.getElementById('calModalDescRow');
  var locLbl  = document.getElementById('calModalLoc');
  var locRow  = document.getElementById('calModalLocRow');

  if (dot)    dot.style.background = col.dot;
  if (title)  title.textContent    = ev.summary || '(제목 없음)';
  if (calLbl) calLbl.textContent   = col.name;

  var isAllDay = ev.start && ev.start.date && !ev.start.dateTime;
  if (isAllDay) {
    var d   = new Date(ev.start.date + 'T00:00:00');
    var end = ev.end && ev.end.date ? new Date(ev.end.date + 'T00:00:00') : null;
    var fmt = function(dt) { return dt.getFullYear() + '년 ' + (dt.getMonth()+1) + '월 ' + dt.getDate() + '일'; };
    if (end && end.getTime() !== d.getTime() + 86400000) {
      var endD = new Date(end.getTime() - 86400000);
      if (dateLbl) dateLbl.textContent = fmt(d) + ' ~ ' + fmt(endD);
    } else {
      if (dateLbl) dateLbl.textContent = fmt(d);
    }
    if (timeRow) timeRow.style.display = 'none';
  } else {
    var start = new Date(ev.start.dateTime);
    var end2  = ev.end && ev.end.dateTime ? new Date(ev.end.dateTime) : null;
    var fmt2  = function(dt) { return dt.getFullYear() + '년 ' + (dt.getMonth()+1) + '월 ' + dt.getDate() + '일'; };
    if (dateLbl) dateLbl.textContent = fmt2(start);
    if (timeRow) timeRow.style.display = 'flex';
    var pad   = function(n) { return String(n).padStart(2, '0'); };
    var ts    = pad(start.getHours()) + ':' + pad(start.getMinutes());
    var te    = end2 ? ' ~ ' + pad(end2.getHours()) + ':' + pad(end2.getMinutes()) : '';
    if (timeLbl) timeLbl.textContent = ts + te;
  }

  if (ev.description) {
    if (descRow) descRow.style.display = 'flex';
    if (descLbl) descLbl.textContent = ev.description.replace(/<[^>]*>/g, '');
  } else {
    if (descRow) descRow.style.display = 'none';
  }
  if (ev.location) {
    if (locRow) locRow.style.display = 'flex';
    if (locLbl) locLbl.textContent   = ev.location;
  } else {
    if (locRow) locRow.style.display = 'none';
  }

  var overlay = document.getElementById('cal-event-modal');
  if (overlay) overlay.classList.add('open');
}

document.getElementById('calModalClose')?.addEventListener('click', function() {
  document.getElementById('cal-event-modal')?.classList.remove('open');
});

  calAllEvents = null;
  this.textContent = '↺ 불러오는 중...';
  this.disabled = true;
  await loadCalendar(true);
  this.textContent = '↺ 새로고침';
  this.disabled = false;
});

/* 편집 버튼 */
document.getElementById('calEditBtn')?.addEventListener('click', function() {
  if (calEditMode) {
    calAccessToken = null; calEditMode = false;
    this.textContent = '✏️ 편집 모드';
    this.classList.remove('logged-in');
    document.getElementById('calRefreshBtn').style.display = 'none';
    document.getElementById('calGrid').classList.remove('edit-mode-active');
    if (calAllEvents !== null) renderCalendar(filterByMonth(calAllEvents, calYear, calMonth));
  } else {
    if (!tokenClient) { alert('잠시 후 다시 시도해주세요.'); return; }
    tokenClient.requestAccessToken();
  }
});

/* 일정 완료 상태 (Supabase 공유) */
var _calCompleted = {};

async function loadCalCompleted() {
  var { data } = await _sb.from('cal_completed').select('event_id');
  if (data) {
    _calCompleted = {};
    data.forEach(function(r) { _calCompleted[r.event_id] = true; });
  }
}

async function toggleEventCompleted(evId) {
  if (_calCompleted[evId]) {
    delete _calCompleted[evId];
    _sb.from('cal_completed').delete().eq('event_id', evId);
  } else {
    _calCompleted[evId] = true;
    _sb.from('cal_completed').upsert({ event_id: evId });
  }
}

/* 날짜 일정 목록 모달 */
function openCalDayModal(dateKey) {
  var body    = document.getElementById('calDayModalBody');
  var footer  = document.getElementById('calDayModalFooter');
  var addBtn  = document.getElementById('calDayModalAddBtn');
  var titleEl = document.getElementById('calDayModalTitle');
  if (!body) return;

  var d = new Date(dateKey + 'T12:00:00');
  var weekdays = ['일','월','화','수','목','금','토'];
  titleEl.textContent = d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 (' + weekdays[d.getDay()] + ')';

  var evs = (calAllEvents || []).filter(function(ev) {
    return getEventDateKeys(ev).indexOf(dateKey) >= 0;
  });

  body.innerHTML = '';
  if (!evs.length) {
    var empty = document.createElement('div');
    empty.className = 'cal-day-list-empty';
    empty.textContent = '등록된 일정이 없어요';
    body.appendChild(empty);
  } else {
    evs.forEach(function(ev) {
      var col      = CAL_COLORS[ev._grade];
      var done     = !!_calCompleted[ev.id];
      var item     = document.createElement('button');
      item.className = 'cal-day-list-item' + (done ? ' completed' : '');
      item.style.background = col.bg;
      item.style.color = col.text;

      /* 체크박스 */
      var chk = document.createElement('div');
      chk.className = 'cal-day-list-check' + (done ? ' checked' : '');
      chk.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleEventCompleted(ev.id);
        var nowDone = !!_calCompleted[ev.id];
        item.classList.toggle('completed', nowDone);
        chk.classList.toggle('checked', nowDone);
      });
      item.appendChild(chk);

      /* 제목 + 메타 */
      var content = document.createElement('div');
      content.className = 'cal-day-list-content';

      var t = document.createElement('div');
      t.className = 'cal-day-list-title';
      t.textContent = ev.summary || '(제목 없음)';
      content.appendChild(t);

      var m = document.createElement('div');
      m.className = 'cal-day-list-meta';
      var isAllDay = ev.start && ev.start.date && !ev.start.dateTime;
      if (isAllDay) {
        m.textContent = col.name + ' · 종일';
      } else {
        var pad = function(n) { return String(n).padStart(2,'0'); };
        var st  = new Date(ev.start.dateTime);
        m.textContent = col.name + ' · ' + pad(st.getHours()) + ':' + pad(st.getMinutes());
      }
      content.appendChild(m);
      item.appendChild(content);

      item.addEventListener('click', function() {
        document.getElementById('cal-day-modal').classList.remove('open');
        if (calEditMode) { openCalForm(null, ev.id, ev._grade); }
        else             { openCalEventModal(ev); }
      });
      body.appendChild(item);
    });
  }

  if (calEditMode) {
    footer.style.display = '';
    addBtn.onclick = function() {
      document.getElementById('cal-day-modal').classList.remove('open');
      openCalForm(dateKey, null, null);
    };
  } else {
    footer.style.display = 'none';
  }

  document.getElementById('cal-day-modal').classList.add('open');
}

document.getElementById('calDayModalClose')?.addEventListener('click', function() {
  document.getElementById('cal-day-modal')?.classList.remove('open');
});
document.getElementById('cal-day-modal')?.addEventListener('click', function(e) {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

/* 폼 열기 */
function openCalForm(dateKey, eventId, grade) {
  calEditEventId = eventId;
  calEditGrade   = grade;
  document.getElementById('calFormTitle').textContent = eventId ? '일정 수정' : '일정 추가';
  document.getElementById('calFormDelete').style.display = eventId ? 'block' : 'none';
  document.getElementById('calFormSummary').value = '';
  document.getElementById('calFormDesc').value    = '';
  document.getElementById('calFormAllDay').checked = true;
  document.getElementById('calFormTimeRow').style.display = 'none';
  document.getElementById('calFormStartDate').value = dateKey || '';
  document.getElementById('calFormEndDate').value   = dateKey || '';

  if (eventId && calAllEvents) {
    var ev = calAllEvents.find(function(e) { return e.id === eventId; });
    if (ev) {
      document.getElementById('calFormSummary').value = ev.summary || '';
      document.getElementById('calFormDesc').value    = ev.description || '';
      document.getElementById('calFormGrade').value   = ev._grade;
      calEditGrade = ev._grade;
      var isAllDay = ev.start && ev.start.date;
      document.getElementById('calFormAllDay').checked = !!isAllDay;
      document.getElementById('calFormTimeRow').style.display = isAllDay ? 'none' : 'flex';
      if (isAllDay) {
        document.getElementById('calFormStartDate').value = ev.start.date;
        var endD = new Date(ev.end.date + 'T00:00:00');
        endD.setDate(endD.getDate() - 1);
        document.getElementById('calFormEndDate').value = endD.toISOString().slice(0,10);
      } else {
        document.getElementById('calFormStartDate').value = ev.start.dateTime.slice(0,10);
        document.getElementById('calFormEndDate').value   = ev.end.dateTime.slice(0,10);
        document.getElementById('calFormStartTime').value = ev.start.dateTime.slice(11,16);
        document.getElementById('calFormEndTime').value   = ev.end.dateTime.slice(11,16);
      }
    }
  }
  document.getElementById('cal-form-modal').classList.add('open');
}

document.getElementById('calFormAllDay')?.addEventListener('change', function() {
  document.getElementById('calFormTimeRow').style.display = this.checked ? 'none' : 'flex';
});

function closeCalForm() { document.getElementById('cal-form-modal').classList.remove('open'); }
document.getElementById('calFormClose')?.addEventListener('click', closeCalForm);
document.getElementById('calFormCancel')?.addEventListener('click', closeCalForm);
document.getElementById('cal-form-modal')?.addEventListener('click', function(e) {
  if (e.target === e.currentTarget) closeCalForm();
});

/* 저장 */
document.getElementById('calFormSaveBtn')?.addEventListener('click', async function() {
  var summary   = document.getElementById('calFormSummary').value.trim();
  if (!summary) { alert('제목을 입력하세요.'); return; }
  var grade     = document.getElementById('calFormGrade').value;
  var calId     = CAL_WRITE_IDS[grade];
  var isAllDay  = document.getElementById('calFormAllDay').checked;
  var startDate = document.getElementById('calFormStartDate').value;
  var endDate   = document.getElementById('calFormEndDate').value || startDate;
  var desc      = document.getElementById('calFormDesc').value.trim();

  var body;
  if (isAllDay) {
    var endD = new Date(endDate + 'T00:00:00');
    endD.setDate(endD.getDate() + 1);
    body = { summary: summary, description: desc,
      start: { date: startDate }, end: { date: endD.toISOString().slice(0,10) } };
  } else {
    var st = document.getElementById('calFormStartTime').value || '09:00';
    var et = document.getElementById('calFormEndTime').value   || '10:00';
    body = { summary: summary, description: desc,
      start: { dateTime: startDate + 'T' + st + ':00', timeZone: 'Asia/Seoul' },
      end:   { dateTime: endDate   + 'T' + et + ':00', timeZone: 'Asia/Seoul' } };
  }

  var url    = CAL_API_BASE + '/' + encodeURIComponent(calId) + '/events' + (calEditEventId ? '/' + calEditEventId : '');
  var method = calEditEventId ? 'PUT' : 'POST';
  try {
    var res = await fetch(url, { method: method,
      headers: { 'Authorization': 'Bearer ' + calAccessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify(body) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    calAllEvents = null;
    closeCalForm();
    await loadCalendar();
  } catch(e) { alert('저장 실패: ' + e.message); }
});

/* 삭제 */
document.getElementById('calFormDelete')?.addEventListener('click', async function() {
  if (!confirm('이 일정을 삭제하시겠습니까?')) return;
  var calId = CAL_WRITE_IDS[calEditGrade];
  try {
    var res = await fetch(CAL_API_BASE + '/' + encodeURIComponent(calId) + '/events/' + calEditEventId, {
      method: 'DELETE', headers: { 'Authorization': 'Bearer ' + calAccessToken } });
    if (!res.ok && res.status !== 204) throw new Error('HTTP ' + res.status);
    calAllEvents = null;
    closeCalForm();
    await loadCalendar();
  } catch(e) { alert('삭제 실패: ' + e.message); }
});

document.querySelectorAll('.cal-filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    calGradeFilter = btn.dataset.grade;
    document.querySelectorAll('.cal-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if (calAllEvents !== null) {
      renderCalendar(filterByMonth(calAllEvents, calYear, calMonth));
    }
  });
});

document.getElementById('calPrevBtn')?.addEventListener('click', function() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  loadCalendar();
});
document.getElementById('calNextBtn')?.addEventListener('click', function() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  loadCalendar();
});
document.getElementById('calTodayBtn')?.addEventListener('click', function() {
  var now = new Date();
  calYear  = now.getFullYear();
  calMonth = now.getMonth();
  loadCalendar();
});

document.addEventListener('dashboard-ready', function() {
  loadCalCompleted();
  loadCalendar();
});
window.addEventListener('load', function() {
  setTimeout(function() {
    if (calAllEvents === null) loadCalendar();
  }, 500);
});

/* ─── 메모 툴팁 ─── */
(function() {
  var tip = document.createElement('div');
  tip.id = 'memo-tooltip';
  document.body.appendChild(tip);
  document.addEventListener('mouseover', function(e) {
    var target = e.target.closest('.item-expand-btn.has-memo, .pri-memo-dot');
    if (!target || !target.dataset.memo) { tip.style.display = 'none'; return; }
    tip.textContent = target.dataset.memo;
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
    tip.style.display = 'block';
  });
  document.addEventListener('mousemove', function(e) {
    if (tip.style.display === 'block') {
      tip.style.left = (e.clientX + 14) + 'px';
      tip.style.top  = (e.clientY - 10) + 'px';
    }
  });
})();
